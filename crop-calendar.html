<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"><title>재배달력 - kFarmAI</title><style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0a0a;color:#17202a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}a{text-decoration:none;color:inherit}.app{max-width:480px;min-height:100dvh;margin:0 auto;background:#F5F6F8}.header{background:#fff;border-bottom:1px solid #ECEEF2;padding:12px 14px 14px}.top{display:flex;align-items:center;justify-content:space-between}.brand img{max-width:180px;height:auto}.home{border:1px solid #CDEBDD;background:#E8F6F0;color:#157A5A;border-radius:999px;padding:8px 11px;font-size:12px;font-weight:900}h1{margin-top:12px;font-size:23px}.sub{margin-top:7px;color:#6B7280;font-size:13px;line-height:1.55}.content{padding:14px 14px 90px}.select{width:100%;height:42px;border:1.5px solid #DDE5E0;border-radius:12px;padding:0 12px;background:#fff;font-weight:800;margin-bottom:10px}.card{background:#fff;border:1px solid #ECEEF2;border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 8px 24px rgba(17,24,39,.05)}.pill{display:inline-flex;padding:5px 8px;border-radius:999px;background:#E8F6F0;color:#157A5A;font-size:11px;font-weight:900;margin:2px}.title{font-size:17px;font-weight:900;margin-bottom:8px}.tasks{padding-left:19px;color:#374151;font-size:13px;line-height:1.7}.safe{background:#FFF8E1;border-color:#FDE68A;color:#5D4400;font-weight:800}.cta{display:grid;grid-template-columns:1fr 1fr;gap:8px}.cta a{min-height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:#E8F6F0;color:#157A5A;border:1px solid #CDEBDD;font-size:12px;font-weight:900}.cta a:nth-child(2){background:#111827;color:#fff;border-color:#111827}
</style></head><body><main class="app"><header class="header"><div class="top"><a class="brand" href="index.html"><img src="static/kfarmai-logo-horizontal.png" alt="kFarmAI"></a><a class="home" href="index.html">홈</a></div><h1>작물별·식물별 재배달력</h1><p class="sub">어업에 금어기가 있듯이 농업에는 작물별 파종·정식·수확·방제 적기가 있습니다. 농촌진흥청_농작업일정 정보 기반으로 고도화 예정입니다.</p></header><section class="content"><select id="crop" class="select"></select><div id="summary"></div><div id="detail"></div><div class="card safe">공공데이터 기반 의사결정 보조 정보이며, 실제 영농 판단은 지역 농업기술센터·전문가 상담과 함께 확인하세요.</div><div class="cta"><a href="crop-guide.html">재배가이드</a><a href="agri-weather.html">농업날씨</a></div></section></main><script>
'use strict';let data;function draw(){const c=data.crops.find(x=>x.name===crop.value)||data.crops[0];summary.innerHTML=`<div class="card"><div class="title">이번 달 할 일</div><div>${data.bestToPlantNow.map(x=>`<span class="pill">${x}</span>`).join('')}</div><p class="sub">지금 심기 좋은 작물 예시입니다.</p></div>`;detail.innerHTML=`<article class="card"><div class="title">${c.name} 월별 관리</div>${c.monthly.map(m=>`<div class="pill">${m.month}월</div><ul class="tasks">${m.tasks.map(t=>`<li>${t}</li>`).join('')}</ul>`).join('')}</article>`}fetch('data/crop_calendar.json',{cache:'no-store'}).then(r=>r.json()).then(d=>{data=d;crop.innerHTML=d.crops.map(c=>`<option>${c.name}</option>`).join('');crop.onchange=draw;draw();});
</script></body></html>
