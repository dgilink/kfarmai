<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>액비 계산기 - kFarmAI</title>
<style>
  *{box-sizing:border-box} body{margin:0;background:#F6F8F5;color:#222;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}
  header{height:58px;background:#fff;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:center}
  .brand{display:flex;align-items:center;text-decoration:none}.brand img{max-width:180px;width:auto;height:auto;object-fit:contain}
  main{max-width:480px;margin:0 auto;padding:18px 16px 28px}.card{background:#fff;border:1.5px solid #C8E6C9;border-radius:16px;padding:18px}
  h1{margin:0 0 8px;color:#1B5E20;font-size:22px;line-height:1.35}.lead{margin:0 0 18px;color:#666;font-size:14px;line-height:1.5}.field{margin:14px 0}
  label{display:block;margin-bottom:7px;color:#333;font-size:13px;font-weight:800}input{width:100%;border:1.5px solid #C8E6C9;border-radius:12px;padding:12px;font-size:15px;outline:0;background:#fff}input:focus{border-color:#1B5E20}
  button{width:100%;border:0;border-radius:12px;padding:14px;background:#1B5E20;color:#fff;font-size:16px;font-weight:900;cursor:pointer}.result{display:none;margin-top:18px;padding:14px;border-radius:14px;background:#F1F8E9}.result-main{color:#1B5E20;font-size:20px;font-weight:900}.result p{margin:8px 0 0;color:#444;font-size:14px}.notice{margin-top:16px;padding:12px 14px;border-left:3px solid #4CAF50;border-radius:8px;background:#E8F5E9;color:#2E7D32;font-size:13px;line-height:1.55}.note{margin-top:14px;color:#777;font-size:12px;line-height:1.5}
</style>
</head>
<body>
<header><a class="brand" href="index.html" aria-label="kFarmAI 홈"><img src="static/kfarmai-logo-horizontal.png" alt="kFarmAI"></a></header>
<main><div class="card">
  <h1>액비 희석 계산기</h1>
  <p class="lead">희석배수와 최종 희석액 양을 입력하면 필요한 원액 mL를 계산합니다.</p>
  <div class="field"><label for="ratio">희석배수</label><input id="ratio" type="number" min="1" step="1" inputmode="numeric" placeholder="예: 1000"></div>
  <div class="field"><label for="liters">최종 희석액 양(L)</label><input id="liters" type="number" min="0" step="0.1" inputmode="decimal"></div>
  <button type="button" onclick="calculateFertilizer()">계산하기</button>
  <div class="result" id="result"><div class="result-main" id="needText"></div><p id="cupText"></p></div>
  <div class="notice">제품 라벨의 권장 희석배수를 반드시 확인하세요.<br>어린 식물은 낮은 농도부터 시작하세요.</div>
  <div class="note">계산 결과는 참고용입니다. 작물 상태, 생육 단계, 제품별 권장 사용량에 따라 조정하세요.</div>
</div></main>
<script>
function num(id){return parseFloat(document.getElementById(id).value)||0}
function fmt(value){return Number(value.toFixed(1)).toString()}
function calculateFertilizer(){const ratio=num('ratio');const liters=num('liters');const amount=ratio>0?liters*1000/ratio:0;document.getElementById('needText').textContent=`물 ${fmt(liters)}L에 원액 ${fmt(amount)}mL`;document.getElementById('cupText').textContent=`계량 기준: ${fmt(amount)}mL`;document.getElementById('result').style.display='block'}
</script>
</body>
</html>
