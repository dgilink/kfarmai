<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>공공자료 기반 AI 참고 진단사례 - kFarmAI</title>
<meta name="description" content="kFarmAI 공공자료 기반 AI 참고 진단사례. AI가 원인 후보를 정리하고 공공데이터가 확인 기준을 제공합니다.">
<meta name="theme-color" content="#1D9E75">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --green: #1D9E75;
    --green-dark: #157A5A;
    --green-soft: #E8F6F0;
    --orange: #FF6B2B;
    --orange-soft: #FFF0E5;
    --bg: #F5F6F8;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --sub: #6B7280;
    --muted: #9AA0A6;
    --border: #ECEEF2;
    --warn: #B45309;
    --warn-bg: #FEF3C7;
  }
  html, body {
    min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", "Noto Sans KR", "Pretendard", sans-serif;
    background: #0a0a0a;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  body { display: flex; justify-content: center; }
  a { color: inherit; }
  .phone {
    width: 100%;
    max-width: 480px;
    min-height: 100dvh;
    background: var(--bg);
  }
  @media (min-width: 520px) {
    body { align-items: center; min-height: 100dvh; padding: 24px 0; }
    .phone { min-height: min(920px, 92dvh); border-radius: 36px; overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,.35); }
  }
  .header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 12px 14px 14px;
  }
  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    min-width: 0;
  }
  .brand img { max-width: 180px; width: auto; height: 36px; object-fit: contain; flex: 0 0 auto; }
  .brand-name {
    font-size: 20px;
    line-height: 1;
    font-weight: 850;
    color: #111827;
  }
  .brand-name span { color: var(--orange); }
  .home-link {
    flex: 0 0 auto;
    text-decoration: none;
    color: var(--green-dark);
    font-size: 12px;
    font-weight: 800;
    border: 1px solid #CDEBDD;
    background: var(--green-soft);
    border-radius: 999px;
    padding: 8px 10px;
  }
  .top-links {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }
  .top-link {
    min-height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    text-decoration: none;
    border-radius: 12px;
    padding: 8px 7px;
    font-size: 12px;
    line-height: 1.25;
    font-weight: 900;
    border: 1px solid #CDEBDD;
    background: var(--green-soft);
    color: var(--green-dark);
  }
  .top-link:nth-child(2) { background: #111827; border-color: #111827; color: #fff; }
  .top-link:nth-child(3) { background: var(--orange-soft); border-color: #FFD7C2; color: #B94712; }
  .top-link:nth-child(4) { background: #fff; border-color: #E2E8F0; color: #334155; }
  .top-link:nth-child(5) { grid-column: 1 / -1; background: #111827; border-color: #111827; color: #fff; }
  .headline { margin-top: 14px; }
  h1 {
    font-size: 23px;
    line-height: 1.25;
    font-weight: 900;
    letter-spacing: -0.3px;
  }
  .subtitle {
    margin-top: 7px;
    color: var(--sub);
    font-size: 13.5px;
    line-height: 1.55;
    font-weight: 600;
  }
  .content { padding: 14px 14px 88px; }
  .summary-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }
  .summary-item {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 8px;
    text-align: center;
    box-shadow: 0 5px 18px rgba(17,24,39,.04);
  }
  .summary-num { color: var(--green-dark); font-size: 17px; font-weight: 900; }
  .summary-label { margin-top: 3px; color: var(--muted); font-size: 10.5px; font-weight: 800; }
  .cases {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .case-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 15px;
    box-shadow: 0 8px 24px rgba(17,24,39,.07);
  }
  .case-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    background: var(--green-soft);
    color: var(--green-dark);
    font-size: 11px;
    line-height: 1;
    font-weight: 900;
    padding: 6px 9px;
    white-space: nowrap;
  }
  .risk {
    background: var(--warn-bg);
    color: var(--warn);
  }
  .crop {
    margin-top: 10px;
    color: var(--orange);
    font-size: 12px;
    font-weight: 900;
  }
  .case-title {
    margin-top: 4px;
    font-size: 19px;
    line-height: 1.3;
    font-weight: 900;
    letter-spacing: -0.2px;
  }
  .demo-question {
    margin-top: 10px;
    background: #FAFAFA;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px;
    color: #374151;
    font-size: 13px;
    line-height: 1.55;
    font-weight: 650;
  }
  .section {
    margin-top: 13px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }
  .section-title {
    color: #111827;
    font-size: 12px;
    line-height: 1;
    font-weight: 900;
    margin-bottom: 8px;
  }
  .body-text {
    color: #374151;
    font-size: 13.5px;
    line-height: 1.62;
  }
  ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  li {
    position: relative;
    padding-left: 13px;
    color: #374151;
    font-size: 13.2px;
    line-height: 1.55;
  }
  li::before {
    content: "";
    position: absolute;
    left: 0;
    top: .68em;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--green);
  }
  .candidate-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .candidate {
    border-radius: 999px;
    background: var(--orange-soft);
    color: #B94712;
    padding: 6px 8px;
    font-size: 11.5px;
    font-weight: 850;
  }
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 14px;
  }
  .action {
    min-height: 42px;
    border-radius: 12px;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 9px 8px;
    font-size: 12.5px;
    line-height: 1.25;
    font-weight: 900;
    border: 1px solid #DDEFE6;
    background: var(--green-soft);
    color: var(--green-dark);
  }
  .action:nth-child(2) { background: #F8FAFC; color: #334155; border-color: #E2E8F0; }
  .action:nth-child(3) { background: var(--orange-soft); color: #B94712; border-color: #FFD7C2; }
  .action:nth-child(4) { background: #111827; color: #fff; border-color: #111827; }
  .source {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    color: var(--sub);
    font-size: 12px;
    font-weight: 750;
  }
  .source a {
    flex: 0 0 auto;
    color: var(--green-dark);
    text-decoration: none;
    font-weight: 900;
  }
  .disclaimer {
    margin-top: 12px;
    border-radius: 12px;
    background: #FFF7ED;
    border: 1px solid #FED7AA;
    color: #9A3412;
    padding: 10px;
    font-size: 12px;
    line-height: 1.55;
    font-weight: 750;
  }
  .page-disclaimer {
    margin-top: 14px;
    border-radius: 16px;
    background: #fff;
    border: 1px solid #FED7AA;
    padding: 14px;
    color: #9A3412;
    font-size: 12.5px;
    line-height: 1.6;
    font-weight: 800;
  }
  .loading, .error {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    color: var(--sub);
    font-size: 14px;
    text-align: center;
  }
  @media (max-width: 360px) {
    .actions { grid-template-columns: 1fr; }
    h1 { font-size: 21px; }
  }
</style>
</head>
<body>
<main class="phone">
  <header class="header">
    <div class="top">
      <a class="brand" href="index.html" aria-label="kFarmAI 홈">
        <img src="/static/kfarmai-logo-horizontal.png" alt="kFarmAI">
      </a>
      <a class="home-link" href="index.html">홈</a>
    </div>
    <div class="headline">
      <h1>공공자료 기반 AI 참고 진단사례</h1>
      <p class="subtitle">AI가 원인 후보를 정리하고, 공공데이터가 확인 기준을 제공합니다.</p>
    </div>
    <nav class="top-links" aria-label="진단사례 관련 페이지">
      <a class="top-link" href="public-data.html">공공데이터 검증 보기</a>
      <a class="top-link" href="diagnosis.html">AI 참고 진단하기</a>
      <a class="top-link" href="agri_map.html">농약사 지도 보기</a>
      <a class="top-link" href="channel.html">커뮤니티 질문하기</a>
      <a class="top-link" href="contest-demo.html">공모전 데모 보기</a>
    </nav>
  </header>

  <section class="content">
    <div class="summary-bar" aria-label="진단사례 요약">
      <div class="summary-item">
        <div class="summary-num">6</div>
        <div class="summary-label">데모 사례</div>
      </div>
      <div class="summary-item">
        <div class="summary-num">공공</div>
        <div class="summary-label">자료 기준</div>
      </div>
      <div class="summary-item">
        <div class="summary-num">확인</div>
        <div class="summary-label">중심 흐름</div>
      </div>
    </div>

    <div id="cases" class="cases">
      <div class="loading">진단사례를 불러오는 중입니다.</div>
    </div>

    <div class="page-disclaimer">
      이 결과는 AI 참고 진단이며 최종 처방이 아닙니다. 농약 사용 전 등록 작물, 병해충, 사용시기, 희석배수, 안전사용기준을 반드시 확인하세요.
    </div>
  </section>
</main>

<script>
'use strict';

const casesEl = document.getElementById('cases');
const FALLBACK_CASES = [
  {
    caseId: 'fallback-pepper-leaf-curl',
    label: '공공자료 기반 참고 콘텐츠',
    crop: '고추',
    title: '고추 잎 말림 확인 포인트',
    userQuestion: '고추 잎이 말리고 생육이 약해 보일 때 확인할 항목입니다.',
    aiSummary: '잎 말림은 해충, 고온, 수분 스트레스 등 여러 원인 후보가 함께 검토되어야 합니다.',
    causeCandidates: ['해충 가능성', '고온·건조 스트레스', '수분 관리 문제'],
    symptoms: ['잎 말림', '생육 저하', '잎 뒷면 이상 여부 확인 필요'],
    publicDataCheck: ['병해충 정보 확인', '농업날씨 확인', '농약 사용 전 안전사용기준 확인'],
    generalCare: ['잎 앞면과 뒷면을 함께 관찰합니다.', '최근 고온·강수·관수 변화를 확인합니다.', '방제 판단 전 등록 작물과 병해충 기준을 확인합니다.'],
    nextActions: ['AI 참고 진단에 증상 설명을 다시 입력합니다.', '공공정보 확인 메뉴에서 안전사용기준을 확인합니다.', '필요 시 지역 상담기관에 확인합니다.'],
    linkedPages: [
      { label: 'AI 참고 진단', url: 'diagnosis.html' },
      { label: '공공정보 확인', url: 'public-data.html' },
      { label: '농업날씨 확인', url: 'agri-weather.html' },
      { label: '커뮤니티 질문하기', url: 'channel.html' }
    ],
    sourceName: '시제품 fallback 참고자료',
    sourceUrl: 'public-data.html',
    disclaimer: '이 결과는 AI 참고 진단이며 최종 처방이 아닙니다. 농약 사용 전 등록 작물, 병해충, 사용시기, 희석배수, 안전사용기준을 반드시 확인하세요.'
  },
  {
    caseId: 'fallback-potting-soil-mold',
    label: '공공자료 기반 참고 콘텐츠',
    crop: '상토·화분',
    title: '상토 곰팡이와 과습 확인 포인트',
    userQuestion: '상토 표면에 흰 곰팡이처럼 보이는 것이 생겼을 때 확인할 항목입니다.',
    aiSummary: '상토 표면의 흰 흔적은 과습, 통풍 부족, 유기물 분해 등 원인 후보를 나누어 확인해야 합니다.',
    causeCandidates: ['과습 가능성', '통풍 부족', '상토 표면 유기물 분해'],
    symptoms: ['흰 곰팡이 흔적', '상토 표면 습함', '배수 상태 확인 필요'],
    publicDataCheck: ['상토·배지 참고자료 확인', '실내 재배 관리 정보 확인', '병해충 정보 확인'],
    generalCare: ['겉흙 마름 정도와 배수구 상태를 확인합니다.', '통풍과 관수 간격을 조정합니다.', '식물 뿌리 상태를 함께 확인합니다.'],
    nextActions: ['사진과 물관리 이력을 함께 기록합니다.', '관련 질문 보기에서 비슷한 증상을 확인합니다.', '공공정보 확인 메뉴를 이용합니다.'],
    linkedPages: [
      { label: 'AI 참고 진단', url: 'diagnosis.html' },
      { label: '공공정보 확인', url: 'public-data.html' },
      { label: '관련 질문 보기', url: 'channel.html' },
      { label: '상토 계산기', url: 'tools-soil.html' }
    ],
    sourceName: '시제품 fallback 참고자료',
    sourceUrl: 'public-data.html',
    disclaimer: '이 결과는 AI 참고 진단이며 최종 처방이 아닙니다. 농약 사용 전 등록 작물, 병해충, 사용시기, 희석배수, 안전사용기준을 반드시 확인하세요.'
  }
];

function escHtml(value) {
  return String(value || '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[ch]));
}

function safeDisplayText(value) {
  return String(value || '')
    .replace(new RegExp('AI ' + '진단', 'g'), 'AI 참고 진단')
    .replace(/진단사례/g, '참고 진단사례');
}

function listHtml(items) {
  return `<ul>${(items || []).map(item => `<li>${escHtml(safeDisplayText(item))}</li>`).join('')}</ul>`;
}

function actionsHtml(links) {
  return `<div class="actions">${(links || []).map(link =>
    `<a class="action" href="${escHtml(link.url)}">${escHtml(safeDisplayText(link.label))}</a>`
  ).join('')}</div>`;
}

function renderCase(item) {
  const candidates = (item.causeCandidates || []).map(name => `<span class="candidate">${escHtml(safeDisplayText(name))}</span>`).join('');
  const disclaimer = '이 결과는 AI 참고 진단이며 최종 처방이 아닙니다. 농약 사용 전 등록 작물, 병해충, 사용시기, 희석배수, 안전사용기준을 반드시 확인하세요.';
  return `
    <article class="case-card" id="${escHtml(item.caseId)}">
      <div class="case-top">
        <span class="badge">${escHtml(safeDisplayText(item.label))}</span>
        <span class="badge risk">주의</span>
      </div>
      <div class="crop">${escHtml(safeDisplayText(item.crop))}</div>
      <h2 class="case-title">${escHtml(safeDisplayText(item.title))}</h2>
      <p class="demo-question">${escHtml(safeDisplayText(item.userQuestion))}</p>

      <div class="section">
        <div class="section-title">AI 참고 진단 요약</div>
        <p class="body-text">${escHtml(safeDisplayText(item.aiSummary))}</p>
      </div>

      <div class="section">
        <div class="section-title">원인 후보</div>
        <div class="candidate-row">${candidates}</div>
      </div>

      <div class="section">
        <div class="section-title">주요 증상</div>
        ${listHtml(item.symptoms)}
      </div>

      <div class="section">
        <div class="section-title">공공데이터 확인 필요</div>
        ${listHtml(item.publicDataCheck)}
      </div>

      <div class="section">
        <div class="section-title">일반 관리 방향</div>
        ${listHtml(item.generalCare)}
      </div>

      <div class="section">
        <div class="section-title">다음 행동</div>
        ${listHtml(item.nextActions)}
      </div>

      ${actionsHtml(item.linkedPages)}

      <div class="source">
        <span>${escHtml(safeDisplayText(item.sourceName))}</span>
        <a href="${escHtml(item.sourceUrl)}" target="_blank" rel="noopener">출처 보기</a>
      </div>
      <div class="disclaimer">${escHtml(safeDisplayText(disclaimer))}</div>
    </article>`;
}

async function loadCases() {
  try {
    const res = await fetch('data/diagnosis_cases.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP_' + res.status);
    const cases = await res.json();
    casesEl.innerHTML = cases.map(renderCase).join('');
  } catch (err) {
    casesEl.innerHTML = '<div class="error">현재 AI 참고 진단 결과를 불러오지 못했습니다. 증상 설명을 다시 확인하거나 공공정보 확인 메뉴를 이용해주세요.</div>' + FALLBACK_CASES.map(renderCase).join('');
  }
}

loadCases();
</script>
</body>
</html>
