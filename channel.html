<style>
  :root { --green:#1D9E75; --green-dark:#0E8A5F; --border:#E5E7EB; --bg:#F6F8F5; --text:#111827; --muted:#6B7280; --card:#fff; }
  * { box-sizing:border-box; }
  html, body { margin:0; min-height:100%; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif; }
  body { padding-bottom:78px; }

  .top { height:58px; display:grid; grid-template-columns:42px auto 1fr; align-items:center; gap:8px; padding:0 14px; }
  .back { width:38px; height:38px; border:0; border-radius:50%; background:#F3F4F6; font-size:20px; cursor:pointer; }
  .channel-title { min-width:0; font-size:18px; font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .search { margin:0 14px 12px; height:42px; display:flex; align-items:center; gap:8px; border:1px solid var(--border); border-radius:14px; background:#F9FAFB; padding:0 12px; }
  .search svg { width:18px; color:#9CA3AF; }
  .search input { flex:1; border:0; outline:0; background:transparent; font-size:14px; }
  .identity { margin:12px 14px 8px; padding:14px; border-radius:16px; background:#fff; border:1px solid rgba(29,158,117,.16); }
  .identity-title { font-size:15px; font-weight:900; line-height:1.35; }
  .identity-text { margin-top:6px; color:#4B5563; font-size:13px; line-height:1.55; }
  .identity-actions { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; margin-top:12px; }
  .identity-actions a { min-height:38px; display:flex; align-items:center; justify-content:center; text-align:center; border-radius:11px; border:1px solid #CDEBDD; background:#E8F6F0; color:var(--green-dark); font-size:12px; font-weight:900; }
  .chips, .category-tabs { display:flex; gap:8px; overflow-x:auto; padding:8px 14px 4px; scrollbar-width:none; }
  .chips::-webkit-scrollbar, .category-tabs::-webkit-scrollbar { display:none; }
  .chip, .category-tab { flex:0 0 auto; height:34px; padding:0 14px; border:1px solid var(--border); border-radius:999px; background:#fff; color:#555; font-size:13px; font-weight:800; cursor:pointer; }
  .chip.active, .category-tab.active { border-color:var(--green); background:rgba(29,158,117,.1); color:var(--green-dark); }

  .post-card.has-thumb { display:grid; grid-template-columns:1fr 86px; gap:10px; align-items:start; }
  .post-thumb { width:86px; height:86px; object-fit:cover; border-radius:12px; border:1px solid var(--border); background:#F3F4F6; }
  .badge, .category-badge, .demo-notice { display:inline-flex; align-items:center; height:22px; padding:0 8px; border-radius:7px; font-size:11px; font-weight:900; margin:0 6px 8px 0; }
  .badge { background:rgba(29,158,117,.12); color:var(--green-dark); }
  .badge.blue { background:#E8F1FF; color:#2563EB; }
  .badge.orange { background:#FFF1E8; color:#EA580C; }
  .badge.teal { background:#E6FFFA; color:#0F766E; }
  .category-badge { background:#E8F5E9; color:var(--green-dark); }
  .demo-notice { background:#F8FAFC; border:1px solid #E2E8F0; color:#475569; }
  .post-title { font-size:15px; font-weight:900; line-height:1.35; margin-bottom:7px; color:#111; }
  .post-content { font-size:13px; color:#555; line-height:1.45; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:9px; }

  .label-row { display:flex; flex-wrap:wrap; gap:5px; margin:9px 0; }
  .status-badge { display:inline-flex; align-items:center; height:22px; padding:0 8px; border-radius:999px; background:#E8F6F0; color:var(--green-dark); font-size:11px; font-weight:900; }
  .ai-summary { margin-top:9px; border-radius:12px; background:#F8FAFC; border:1px solid #E2E8F0; padding:10px; color:#374151; font-size:13px; line-height:1.55; font-weight:650; }
  .demo-actions { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-top:11px; }

  .demo-actions button { background:#111827; color:#fff; border-color:#111827; }

  .fab { position:fixed; right:calc(50% - 246px); bottom:86px; z-index:45; height:48px; padding:0 18px; border:0; border-radius:999px; background:var(--green); color:#fff; font-size:15px; font-weight:900; box-shadow:0 10px 24px rgba(29,158,117,.34); cursor:pointer; }

  .bottom-nav { position:fixed; left:50%; bottom:0; transform:translateX(-50%); z-index:50; width:100%; max-width:520px; height:66px; display:flex; background:rgba(255,255,255,.97); border-top:1px solid var(--border); backdrop-filter:blur(14px); }

  .modal-overlay.open, .my-panel-overlay.open { display:flex; }
  .modal { width:100%; max-width:520px; max-height:88vh; overflow:auto; background:#fff; border-radius:22px 22px 0 0; padding:18px 18px 24px; }
  .modal-handle { display:block; width:36px; height:4px; border:0; padding:0; border-radius:2px; background:var(--border); margin:0 auto 16px; cursor:pointer; }

  .field { margin:12px 0; }
  .label { font-size:13px; font-weight:900; color:#444; margin-bottom:7px; }
  .input, .select, .textarea { width:100%; border:1.5px solid var(--border); border-radius:12px; outline:0; padding:11px 12px; font-size:14px; background:#fff; }
  .textarea { min-height:110px; resize:vertical; }

  .image-remove { position:absolute; top:4px; right:4px; width:22px; height:22px; border:0; border-radius:50%; background:rgba(0,0,0,.62); color:#fff; font-size:14px; font-weight:900; cursor:pointer; line-height:22px; }

  .login-box strong { display:block; font-size:18px; margin-bottom:6px; }
  .login-box p { margin:0 0 16px; color:#777; font-size:13px; }
  .google, .btn-email { width:100%; min-height:46px; border-radius:13px; font-size:14px; font-weight:900; cursor:pointer; }
  .google { border:1px solid var(--border); background:#fff; }
  .email-auth { margin-top:12px; display:grid; gap:8px; }

  .email-auth-actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .btn-email { border:0; background:var(--green); color:#fff; }
  .btn-email.secondary { background:#111827; }
  .toast { position:fixed; left:50%; bottom:84px; transform:translateX(-50%); z-index:200; background:#111; color:#fff; border-radius:999px; padding:11px 16px; font-size:13px; font-weight:800; opacity:0; pointer-events:none; transition:opacity .2s; }

</style>

const CHANNEL_CONFIG = {

const params = new URLSearchParams(location.search);
const slugParam = params.get('slug') || '';
let sb, currentUser=null, channels=[], currentChannel=null, activeCategory='', keyword='', offset=0, isLoading=false, hasMore=true, demoThreads=null, selectedPostImages=[];

document.addEventListener('DOMContentLoaded', init);
async function init(){
  sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  const {data:{session}}=await sb.auth.getSession();
  currentUser=session?.user||null;
  sb.auth.onAuthStateChange((event,session)=>{currentUser=session?.user||null; if(currentUser)closeLoginModal();});
  await loadChannels();
  bindCategoryTabs();
  document.getElementById('searchInput').addEventListener('input', debounce(applyKeywordSearch, 300));
  window.addEventListener('scroll', handleScroll, {passive:true});
  document.addEventListener('keydown', e=>{ if(e.key==='Escape'){closeWriteModal();closeLoginModal();} });
  resetAndLoad();
}
async function loadChannels(){
  try{
    const {data,error}=await sb.from('channels').select('id, slug, name').order('slug');
    if(error)throw error;
    channels=mergeDefaultChannels(data);
  }catch(e){channels=defaultChannels();}
  currentChannel=slugParam?channels.find(ch=>ch.slug===slugParam):null;
  document.getElementById('channelTitle').textContent=currentChannel?.name || (slugParam?(CHANNEL_CONFIG[slugParam]||'채널'):'전체 게시글');
  renderChannelSelect();
  renderChannelChips();
}
function defaultChannels(){return Object.entries(CHANNEL_CONFIG).map(([slug,name])=>({id:slug,slug,name}));}
function mergeDefaultChannels(data){
  const bySlug=new Map((Array.isArray(data)?data:[]).filter(ch=>ch?.slug).map(ch=>[ch.slug,ch]));
  defaultChannels().forEach(ch=>{if(!bySlug.has(ch.slug))bySlug.set(ch.slug,ch);});
  return defaultChannels().map(ch=>bySlug.get(ch.slug));
}
function renderChannelSelect(){
  const select=document.getElementById('channelSelect');
  select.innerHTML='<option value="">채널을 선택하세요</option>';
  channels.forEach(ch=>{
    const opt=document.createElement('option');
    opt.value=ch.id;
    opt.textContent=ch.name||CHANNEL_CONFIG[ch.slug]||'일반';
    if(currentChannel&&ch.id===currentChannel.id)opt.selected=true;
    select.appendChild(opt);
  });
}
function renderChannelChips(){
  const wrap=document.getElementById('channelChips');
  wrap.innerHTML='<button class="chip" data-slug="">전체 채널</button>'+channels.map(ch=>`<button class="chip" data-slug="${esc(ch.slug)}">${esc(ch.name||CHANNEL_CONFIG[ch.slug]||'일반')}</button>`).join('');
  wrap.querySelectorAll('.chip').forEach(btn=>btn.classList.toggle('active',(btn.dataset.slug||'')===(currentChannel?.slug||'')));
  wrap.addEventListener('click',e=>{
    const btn=e.target.closest('.chip'); if(!btn)return;
    const slug=btn.dataset.slug||'';
    currentChannel=slug?channels.find(ch=>ch.slug===slug):null;
    document.getElementById('channelTitle').textContent=currentChannel?.name||'전체 게시글';
    renderChannelSelect();
    wrap.querySelectorAll('.chip').forEach(item=>item.classList.remove('active'));
    btn.classList.add('active');
    resetAndLoad();
  }, {once:false});
}
function bindCategoryTabs(){
  document.getElementById('categoryTabs').addEventListener('click',e=>{
    const btn=e.target.closest('.category-tab'); if(!btn)return;
    document.querySelectorAll('.category-tab').forEach(tab=>tab.classList.remove('active'));
    btn.classList.add('active');
    activeCategory=btn.dataset.category||'';
    resetAndLoad();
  });
}
function applyKeywordSearch(){keyword=document.getElementById('searchInput').value.trim();resetAndLoad();}
function resetAndLoad(){offset=0;hasMore=true;document.getElementById('postList').innerHTML='<div class="loading"><span class="spinner"></span>불러오는 중...</div>';loadPosts();}
async function loadPosts(){
  if(isLoading||!hasMore)return;
  isLoading=true;
  document.getElementById('moreLoader').style.display=offset>0?'block':'none';
  try{
    let query=sb.from('posts').select('id,user_id,channel_id,title,content,category,region_tag,image_urls,view_count,created_at,channels(name,slug),comments(count)',{count:'exact'}).order('created_at',{ascending:false}).range(offset,offset+PAGE_SIZE-1);
    if(currentChannel?.id)query=query.eq('channel_id',currentChannel.id);
    if(activeCategory)query=query.eq('category',activeCategory);
    if(keyword)query=query.or(`title.ilike.%${escapeLike(keyword)}%,content.ilike.%${escapeLike(keyword)}%`);
    const {data,count,error}=await query;
    if(error)throw error;
    renderPosts(data||[],count||0);
    offset+=(data||[]).length;
    hasMore=(data||[]).length===PAGE_SIZE;
  }catch(e){
    if(offset===0)await renderDemoThreads('공개 질문을 불러오는 중입니다. 현재는 공모전 시연용 질문을 표시합니다.');
  }finally{
    isLoading=false;
    document.getElementById('moreLoader').style.display='none';
  }
}
function renderPosts(posts,totalCount){
  const list=document.getElementById('postList');
  document.getElementById('resultLabel').textContent=currentChannel?.name||activeCategory||'최신 글';
  document.getElementById('resultCount').textContent=`${totalCount}개`;
  if(offset===0)list.innerHTML='';
  if(!posts.length&&offset===0){renderDemoThreads('아직 공개 질문이 없어 공모전 시연용 질문을 표시합니다.');return;}
  posts.forEach(post=>{
    const slug=post.channels?.slug||channels.find(ch=>ch.id===post.channel_id)?.slug||'';
    const imageUrls=normalizeImages(post.image_urls);
    const thumbHtml=imageUrls[0]?`<img class="post-thumb" src="${esc(imageUrls[0])}" alt="게시글 이미지" loading="lazy">`:'';
    const commentCount=Array.isArray(post.comments)&&post.comments[0]?.count!==undefined?post.comments[0].count:0;
    const card=document.createElement('article');
    card.className='post-card'+(thumbHtml?' has-thumb':'');
    card.style.cursor='pointer';
    card.onclick=()=>{location.href='post.html?id='+encodeURIComponent(post.id);};
    card.innerHTML=`<div><span class="badge ${CHANNEL_BADGE_COLORS[slug]||''}">${esc(post.channels?.name||CHANNEL_CONFIG[slug]||'일반')}</span>${post.category?`<span class="category-badge">${esc(post.category)}</span>`:''}<div class="post-title">${esc(post.title||'제목 없음')}</div><div class="post-content">${esc(post.content||'')}</div><div class="meta"><span>${post.user_id?'회원':'익명'} 작성자</span><span>댓글 ${commentCount}</span><span>조회 ${post.view_count||0}</span><span>${post.region_tag?'#'+esc(post.region_tag):'지역 미정'}</span><span>${timeAgo(post.created_at)}</span></div></div>${thumbHtml}`;
    list.appendChild(card);
  });
}
async function loadDemoThreads(){
  if(demoThreads)return demoThreads;
  try{
    const res=await fetch('data/community_threads.json',{cache:'no-store'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    demoThreads=await res.json();
  }catch(e){
    demoThreads=[
      {channelSlug:'plant-hospital',channelName:'식물 병원',title:'토마토 잎 뒷면에 회색 곰팡이가 보여요',summary:'시설 토마토 잎 뒷면에 회색 곰팡이층이 보입니다.',region:'전남 순천',category:'딸기·토마토',labels:['AI 요약','공공정보 확인','시연'],demoNotice:'공모전 시연용 질문',aiSummary:'AI가 원인 후보를 추정했으며 공공정보 확인과 전문가 상담이 필요합니다.'},
      {channelSlug:'plant-question',channelName:'식물 질문방',title:'화분 잎이 노랗게 변해요',summary:'아래쪽 잎부터 노랗게 변하고 있습니다.',region:'충남 논산',category:'반려식물',labels:['커뮤니티 답변 대기','관찰 필요'],demoNotice:'시연용 질문',aiSummary:'물주기, 광량, 배수 상태를 함께 확인해보는 것이 좋습니다.'}
    ];
  }
  return Array.isArray(demoThreads)?demoThreads:[];
}
async function renderDemoThreads(message){
  const list=document.getElementById('postList');
  const threads=await loadDemoThreads();
  const kw=keyword.toLowerCase();
  const filtered=threads.filter(item=>(!currentChannel?.slug||item.channelSlug===currentChannel.slug)&&(!activeCategory||item.category===activeCategory)&&(!kw||[item.channelName,item.title,item.summary,item.region,item.category,item.aiSummary].join(' ').toLowerCase().includes(kw)));
  document.getElementById('resultLabel').textContent=currentChannel?.name||activeCategory||'커뮤니티 예시';
  document.getElementById('resultCount').textContent=`${filtered.length}개`;
  if(!filtered.length){list.innerHTML=`<div class="empty">${esc(message)}<br>조건에 맞는 시연용 질문이 없습니다.</div>`;return;}
  list.innerHTML=`<div class="empty" style="padding:18px 12px 8px">${esc(message)}</div>`+filtered.map(item=>`
    <article class="demo-card">
      <div><span class="badge ${CHANNEL_BADGE_COLORS[item.channelSlug]||''}">${esc(item.channelName)}</span><span class="category-badge">${esc(item.category)}</span><span class="demo-notice">${esc(item.demoNotice||'시연용 질문')}</span></div>
      <div class="post-title">${esc(item.title)}</div>
      <div class="post-content">${esc(item.summary)}</div>
      <div class="meta"><span>#${esc(item.region)}</span><span>시연</span><span>공공정보 연결</span></div>
      <div class="label-row">${(item.labels||[]).map(label=>`<span class="status-badge">${esc(label)}</span>`).join('')}</div>
      <div class="ai-summary"><strong>AI 참고 요약</strong><br>${esc(item.aiSummary)}</div>
      <div class="demo-actions"><a href="diagnosis.html">AI 진단하기</a><a href="diagnosis-cases.html">비슷한 사례 보기</a><a href="public-data.html">공공데이터 확인</a><button type="button" onclick="openWriteFlow()">질문하기</button></div>
    </article>`).join('');
}
function handleScroll(){if(!hasMore||isLoading)return;if(window.innerHeight+window.scrollY>=document.body.offsetHeight-260)loadPosts();}
async function openWriteFlow(){renderChannelSelect();document.getElementById('writeModal').classList.add('open');lockBodyScroll();}
function closeWriteModal(){document.getElementById('writeModal').classList.remove('open');unlockBodyScroll();}
async function safeOpenMyPanel(){renderMyModal();openLoginModal();}
function openLoginModal(){renderMyModal();document.getElementById('loginModal').classList.add('open');lockBodyScroll();}
function closeLoginModal(){document.getElementById('loginModal').classList.remove('open');unlockBodyScroll();}
function renderMyModal(){
  const title=document.getElementById('myModalTitle');
  const body=document.getElementById('myModalBody');
  if(!title||!body)return;
  if(currentUser){
    const name=currentUser.user_metadata?.full_name||currentUser.user_metadata?.name||currentUser.email?.split('@')[0]||'사용자';
    title.textContent='MY';
    body.innerHTML=`<strong>${esc(name)}</strong><p>${esc(currentUser.email||'로그인 사용자')}</p><button class="google" type="button" onclick="location.href='index.html'">홈에서 MY 보기</button><div style="height:8px"></div><button class="btn-email secondary" type="button" onclick="logout()">로그아웃</button>`;
  }else{
    title.textContent='로그인/가입';
    body.innerHTML=`<strong>로그인하고 글을 작성하세요</strong><p>질문 등록, 댓글, 진단 기록 기능을 이용할 수 있습니다.</p><button class="google" id="googleBtn" type="button" onclick="loginGoogle()">Google로 시작하기</button><div class="email-auth"><input id="authEmail" type="email" placeholder="이메일" autocomplete="email"><input id="authPassword" type="password" placeholder="비밀번호 6자 이상" autocomplete="current-password"><button class="btn-email secondary" id="magicLinkBtn" type="button" onclick="sendMagicLink()">이메일로 로그인 링크 받기</button><div class="email-auth-actions"><button class="btn-email secondary" id="emailLoginBtn" type="button" onclick="loginEmail()">이메일/비밀번호 로그인</button><button class="btn-email" id="emailSignupBtn" type="button" onclick="signupEmail()">이메일/비밀번호로 가입</button></div></div>`;
  }
}
function lockBodyScroll(){document.body.style.overflow='hidden';}
function unlockBodyScroll(){if(!document.querySelector('.modal-overlay.open,.my-panel-overlay.open'))document.body.style.overflow='';}
function getLocalUserId(){let id=localStorage.getItem('kfarmai_user_id');if(!id){id='local_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,9);localStorage.setItem('kfarmai_user_id',id);}return id;}
function handlePostImages(input){const incoming=Array.from(input.files||[]).filter(file=>file.type.startsWith('image/'));if(selectedPostImages.length+incoming.length>3){showToast('최대 3장까지 첨부 가능합니다');input.value='';return;}selectedPostImages=selectedPostImages.concat(incoming).slice(0,3);input.value='';renderPostImagePreview();}
function renderPostImagePreview(){const wrap=document.getElementById('postImagePreview');wrap.innerHTML='';selectedPostImages.forEach((file,idx)=>{const item=document.createElement('div');item.className='image-thumb';const url=URL.createObjectURL(file);item.innerHTML=`<img src="${url}" alt="첨부 이미지"><button class="image-remove" type="button" onclick="removePostImage(${idx})">&times;</button>`;wrap.appendChild(item);});}
function removePostImage(idx){selectedPostImages.splice(idx,1);renderPostImagePreview();}
async function uploadPostImages(userId){const urls=[];for(let i=0;i<selectedPostImages.length;i++){const file=selectedPostImages[i];const ext=(file.name.split('.').pop()||'jpg').replace(/[^a-zA-Z0-9]/g,'').toLowerCase()||'jpg';const path=`${userId}/${Date.now()}_${i}_${Math.random().toString(36).slice(2)}.${ext}`;const {error}=await sb.storage.from('post-images').upload(path,file,{cacheControl:'3600',upsert:false,contentType:file.type||'image/jpeg'});if(error)throw error;const {data}=sb.storage.from('post-images').getPublicUrl(path);if(data?.publicUrl)urls.push(data.publicUrl);}return urls;}
async function submitPost(){
  const channelId=document.getElementById('channelSelect').value;
  const category=document.getElementById('postCategory').value;
  const title=document.getElementById('postTitle').value.trim();
  const content=document.getElementById('postContent').value.trim();
  const region=document.getElementById('regionSelect').value;
  if(!channelId||!category||!title||!content)return showToast('채널, 카테고리, 제목, 내용을 입력해주세요.');
  const btn=document.getElementById('submitBtn');btn.disabled=true;
  try{
    const {data:{session}}=await sb.auth.getSession();
    const userId=session?.user?.id||getLocalUserId();
    localStorage.setItem('kfarmai_user_id',userId);
    const imageUrls=await uploadPostImages(userId);
    const {error}=await sb.from('posts').insert({user_id:userId,channel_id:channelId,title,content,category,region_tag:region||null,image_urls:imageUrls});
    if(error)throw error;
    showToast('질문이 등록되었습니다.');
    closeWriteModal();
    ['postTitle','postContent','postCategory','regionSelect'].forEach(id=>{document.getElementById(id).value='';});
    selectedPostImages=[];renderPostImagePreview();resetAndLoad();
  }catch(err){showToast('등록 실패: '+(err.message||err));}
  finally{btn.disabled=false;}
}
async function loginGoogle(){const btn=document.getElementById('googleBtn');setAuthButtonLoading(btn,true);const {error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.origin+'/auth-callback.html'}});if(error){setAuthButtonLoading(btn,false);showToast('로그인을 시작하지 못했습니다.');}}
async function loginEmail(){const email=document.getElementById('authEmail').value.trim();const password=document.getElementById('authPassword').value;if(!email||!password)return showToast('이메일과 비밀번호를 입력해주세요.');const btn=document.getElementById('emailLoginBtn');setAuthButtonLoading(btn,true);try{const {error}=await sb.auth.signInWithPassword({email,password});if(error)throw error;showToast('로그인되었습니다');}catch(e){showToast('로그인 정보를 다시 확인해주세요.');}finally{setAuthButtonLoading(btn,false);}}
async function signupEmail(){const email=document.getElementById('authEmail').value.trim();const password=document.getElementById('authPassword').value;if(!email||!password)return showToast('이메일과 비밀번호를 입력해주세요.');if(password.length<6)return showToast('비밀번호는 6자 이상 입력해주세요.');const btn=document.getElementById('emailSignupBtn');setAuthButtonLoading(btn,true);try{const {error}=await sb.auth.signUp({email,password,options:{emailRedirectTo:location.origin+'/auth-callback.html'}});if(error)throw error;showToast('확인 메일을 보냈습니다. 메일의 확인 버튼을 눌러 가입을 완료하세요.');}catch(e){showToast('가입을 처리하지 못했습니다.');}finally{setAuthButtonLoading(btn,false);}}
async function sendMagicLink(){const email=document.getElementById('authEmail').value.trim();if(!email)return showToast('이메일을 입력해주세요.');const btn=document.getElementById('magicLinkBtn');setAuthButtonLoading(btn,true);try{const {error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:location.origin+'/auth-callback.html'}});if(error)throw error;showToast('로그인 링크를 보냈습니다. 메일을 확인해주세요.');}catch(e){showToast('로그인 링크를 보내지 못했습니다.');}finally{setAuthButtonLoading(btn,false);}}
function setAuthButtonLoading(btn,loading){if(!btn)return;if(loading){btn.dataset.originalText=btn.textContent;btn.textContent='처리 중...';btn.disabled=true;}else{btn.textContent=btn.dataset.originalText||btn.textContent;btn.disabled=false;}}
async function logout(){if(!sb)return;await sb.auth.signOut();currentUser=null;renderMyModal();showToast('로그아웃되었습니다');}
function normalizeImages(value){if(!value)return[];if(Array.isArray(value))return value.filter(Boolean);if(typeof value==='string'){try{const parsed=JSON.parse(value);return Array.isArray(parsed)?parsed.filter(Boolean):[value].filter(Boolean);}catch(e){return value.split(',').map(v=>v.trim()).filter(Boolean);}}return[];}
function timeAgo(dateValue){if(!dateValue)return '방금 전';const diff=Date.now()-new Date(dateValue).getTime();const min=Math.floor(diff/60000);if(min<1)return '방금 전';if(min<60)return `${min}분 전`;const hour=Math.floor(min/60);if(hour<24)return `${hour}시간 전`;const day=Math.floor(hour/24);if(day<7)return `${day}일 전`;return new Date(dateValue).toLocaleDateString('ko-KR');}
function debounce(fn,wait){let timer;return(...args)=>{clearTimeout(timer);timer=setTimeout(()=>fn(...args),wait);};}
function escapeLike(value){return String(value||'').replace(/[%_]/g,m=>'\\'+m);}
function esc(value){return String(value||'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));}
function showToast(message){const toast=document.getElementById('toast');toast.textContent=message;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1800);}
</script>
</body>
</html>
