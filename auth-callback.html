<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 처리 중 - kFarmAI</title>
<style>
  *{box-sizing:border-box} body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#F6F8F5;color:#111827;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}
  .card{width:min(420px,calc(100% - 32px));background:#fff;border:1px solid #E5E7EB;border-radius:18px;padding:24px;text-align:center;box-shadow:0 12px 34px rgba(0,0,0,.08)}
  .brand{display:flex;justify-content:center;align-items:center;gap:9px;margin-bottom:18px}.brand img{width:38px;height:38px}.brand strong{font-size:20px}.brand span{color:#FF6B2B}
  .spinner{width:30px;height:30px;margin:0 auto 14px;border:3px solid rgba(29,158,117,.18);border-top-color:#1D9E75;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
  h1{font-size:19px;margin:0 0 8px}p{margin:0;color:#6B7280;font-size:14px;line-height:1.55}.actions{display:none;gap:8px;margin-top:18px}.actions.show{display:grid}.btn{display:block;border:0;border-radius:12px;padding:13px;background:#1D9E75;color:#fff;text-decoration:none;font-size:14px;font-weight:900}.btn.secondary{background:#111827}
  .note{margin-top:14px;padding:11px;border-radius:12px;background:#F8FAFC;color:#64748B;font-size:12px;text-align:left}
</style>
</head>
<body>
<main class="card">
  <div class="brand"><img src="logo-transparent.png" alt="kFarmAI"><strong>kFarm<span>AI</span></strong></div>
  <div class="spinner" id="spinner"></div>
  <h1 id="title">로그인 처리 중입니다</h1>
  <p id="message">잠시만 기다려주세요.</p>
  <div class="actions" id="actions">
    <a class="btn" href="index.html">홈으로 돌아가기</a>
    <a class="btn secondary" href="index.html?login=retry">다시 로그인하기</a>
  </div>
  <div class="note">운영 배포 전 Supabase Dashboard에서 Site URL은 https://kfarmai.com, Redirect URLs는 https://kfarmai.com/auth-callback.html 및 로컬 테스트 URL을 허용해야 합니다.</div>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://xzetqijeucldbfgjuoes.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6ZXRxaWpldWNsZGJmZ2p1b2VzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NjIwODYsImV4cCI6MjA5NTEzODA4Nn0.QAizDLXQC1DrRi5C0sPahK6s_-6X4zkTEjzJZ6CFprw';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const title=document.getElementById('title');
const message=document.getElementById('message');
const actions=document.getElementById('actions');
const spinner=document.getElementById('spinner');
async function finish(){
  try{
    const {data:{session},error}=await sb.auth.getSession();
    if(error)throw error;
    if(session){
      title.textContent='로그인되었습니다';
      message.textContent='홈으로 이동합니다.';
      setTimeout(()=>location.replace('index.html?login=success'),700);
      return;
    }
    title.textContent='메일 확인이 완료되었습니다';
    message.textContent='자동으로 로그인되지 않으면 다시 로그인해주세요.';
  }catch(e){
    title.textContent='로그인을 완료하지 못했습니다';
    message.textContent='링크가 만료되었거나 Redirect URL 설정이 맞지 않을 수 있습니다.';
  }
  spinner.style.display='none';
  actions.classList.add('show');
}
finish();
</script>
</body>
</html>
