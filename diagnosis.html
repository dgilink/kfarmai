<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>AI 참고 진단 — kFarmAI</title>
<meta name="description" content="kFarmAI AI 참고 진단 — 사진과 증상으로 원인 후보, 확인 포인트, 공공정보 확인 항목을 정리합니다.">
<meta name="theme-color" content="#0B1410">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    /* kFarmAI base (header) */
    --green: #1D9E75;
    --green-dark: #157A5A;
    --orange: #FF6B2B;
    --border: #ECEEF2;
    --pill: #F1F3F5;
    --text: #1A1A1A;
    --sub: #6B7280;

    /* AI · Tech · Agri palette (diagnosis surface) */
    --bg-dark: #0B1410;
    --surface: #14201B;
    --surface-2: #1B2A23;
    --line-dark: rgba(255,255,255,.08);
    --lime: #B6FF3C;          /* AI primary */
    --lime-2: #00E5A0;        /* green tech */
    --cyan: #22D3EE;          /* data accent */
    --txt-on-dark: #E8F5EE;
    --muted-dark: #7A8B82;
    --danger: #FF5577;
    --danger-soft: rgba(255,85,119,.12);

    --grad-ai: linear-gradient(135deg, #B6FF3C 0%, #00E5A0 55%, #22D3EE 100%);
    --grad-card: linear-gradient(160deg, #18261F 0%, #0F1A15 100%);
    --glow-lime: 0 0 22px rgba(182,255,60,.35);
  }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", "Noto Sans KR", "Pretendard", sans-serif;
    background: #050807;
    color: var(--text);
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
  }
  body { display: flex; justify-content: center; align-items: center; min-height: 100dvh; }

  .phone {
    width: 100%; max-width: 480px;
    height: 100dvh; max-height: 920px;
    background: var(--bg-dark);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  @media (min-width: 520px) {
    .phone { border-radius: 36px; height: 92vh; box-shadow: 0 24px 60px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.04); }
  }

  /* ===== Header (white, kFarmAI 통일) ===== */
  .header {
    flex-shrink: 0;
    background: #fff;
    padding: 10px 14px 0;
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }
  .top-bar { display: flex; align-items: center; justify-content: space-between; padding-bottom: 8px; }
  .brand { display: flex; align-items: center; gap: 8px; }
  .brand img { width: 36px; height: 36px; object-fit: contain; }
  .brand-text { display: flex; flex-direction: column; line-height: 1; gap: 4px; }
  .brand-name {
    font-size: 22px; font-weight: 800; letter-spacing: -0.6px; color: #1A2332;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Rounded", "Pretendard", sans-serif;
  }
  .brand-name .ai { color: var(--orange); margin-left: 3px; }
  .brand-sub { font-size: 8.5px; font-weight: 700; color: #6B7B8C; letter-spacing: 2.4px; }
  .search {
    display: flex; align-items: center; gap: 8px;
    background: #F3F4F6; border-radius: 12px;
    padding: 10px 12px; margin: 4px 0 8px;
  }
  .search svg { width: 18px; height: 18px; color: var(--green); flex-shrink: 0; }
  .search input { flex: 1; border: none; background: transparent; outline: none; font-size: 13px; color: #111; }
  .search input::placeholder { color: #9CA3AF; }
  .bell { position: relative; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .bell svg { width: 22px; height: 22px; color: #333; }
  .bell::after {
    content: ''; position: absolute; top: 3px; right: 3px;
    width: 7px; height: 7px; border-radius: 50%; background: var(--orange); border: 1.5px solid #fff;
  }

  .tabs { display: flex; gap: 6px; background: var(--pill); border-radius: 22px; padding: 4px; margin: 2px 0 10px; }
  .tab { flex: 1; text-align: center; padding: 9px 0; font-size: 13.5px; font-weight: 700; color: #6B7280; border-radius: 18px; cursor: pointer; user-select: none; transition: all .25s; }
  .tab.active { background: #111; color: #fff; box-shadow: 0 2px 6px rgba(0,0,0,.15); }
  .case-link {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    margin: 0 0 10px; padding: 10px 12px;
    border-radius: 14px; border: 1px solid #CDEBDD;
    background: #E8F6F0; color: #157A5A;
    text-decoration: none; font-size: 12.5px; font-weight: 800;
  }
  .case-link span { color: #FF6B2B; font-weight: 900; flex-shrink: 0; }

  /* ===== Scroll area (dark tech bg) ===== */
  .scroll-area {
    flex: 1; min-height: 0; overflow-y: auto;
    background:
      radial-gradient(80% 50% at 0% 0%, rgba(0,229,160,.10) 0%, transparent 60%),
      radial-gradient(70% 40% at 100% 100%, rgba(34,211,238,.08) 0%, transparent 60%),
      var(--bg-dark);
    padding: 12px 14px 14px;
    display: flex; flex-direction: column;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* Pull-to-refresh */
  .ptr {
    flex-shrink: 0; display: flex; align-items: center; justify-content: center; gap: 8px;
    height: 0; overflow: hidden; color: var(--lime); font-size: 13px; font-weight: 600;
    transition: height .2s ease;
  }
  .ptr.visible { height: 44px; }
  .ptr-icon { font-size: 18px; transition: transform .3s ease; display: inline-block; }
  .ptr-icon.flip { transform: rotate(180deg); }
  .ptr-spin {
    width: 18px; height: 18px; border: 2.5px solid rgba(182,255,60,.2); border-top-color: var(--lime);
    border-radius: 50%; animation: spin .75s linear infinite; display: none;
  }
  .ptr-spin.show { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== Diagnosis card ===== */
  .diag-card {
    flex: 1; min-height: 0;
    background: var(--grad-card);
    border: 1px solid rgba(182,255,60,.25);
    border-radius: 20px;
    display: flex; flex-direction: column;
    position: relative;
    box-shadow: 0 8px 32px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.04);
    overflow: hidden;
  }
  .diag-card::before {
    content: ''; position: absolute; inset: 0; padding: 1px;
    border-radius: 20px; pointer-events: none;
    background: linear-gradient(135deg, rgba(182,255,60,.5), rgba(34,211,238,.3) 50%, transparent 80%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
  }
  .card-hd {
    flex-shrink: 0;
    background: rgba(182,255,60,.06);
    border-bottom: 1px solid var(--line-dark);
    padding: 9px 14px;
    display: flex; align-items: center; gap: 8px;
    position: relative; z-index: 2;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--lime);
    box-shadow: 0 0 8px var(--lime); flex-shrink: 0;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  .card-hd-txt {
    font-size: 11.5px; color: var(--lime); font-weight: 700;
    letter-spacing: 1.2px; text-transform: uppercase;
  }
  .card-hd-tag {
    margin-left: auto; font-size: 10px; color: var(--cyan); font-weight: 700;
    letter-spacing: 1px; opacity: .85;
  }

  /* Loading overlay */
  .diag-overlay {
    position: absolute; inset: 0; border-radius: 20px;
    background: rgba(11,20,16,.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    z-index: 20;
    display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
  }
  .diag-overlay.show { display: flex; }
  .overlay-spin {
    width: 44px; height: 44px; border: 3px solid rgba(182,255,60,.15); border-top-color: var(--lime);
    border-radius: 50%; animation: spin .8s linear infinite;
    box-shadow: var(--glow-lime);
  }
  .overlay-txt { font-size: 14px; font-weight: 700; color: var(--lime); letter-spacing: .3px; }
  .overlay-sub { font-size: 11px; color: var(--muted-dark); }

  .inner {
    flex: 1; min-height: 0; padding: 14px;
    display: flex; flex-direction: column; gap: 14px;
    position: relative; z-index: 2;
  }

  /* Step indicator — 2 steps */
  .steps { flex-shrink: 0; display: flex; align-items: flex-start; justify-content: center; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .step-c {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800;
    background: rgba(255,255,255,.06); color: var(--muted-dark);
    border: 1px solid var(--line-dark);
    transition: all .3s;
  }
  .step-c.on {
    background: var(--grad-ai); color: #0B1410; border-color: transparent;
    box-shadow: var(--glow-lime);
  }
  .step-n { font-size: 10px; color: var(--muted-dark); font-weight: 700; letter-spacing: .5px; transition: color .25s; }
  .step-n.on { color: var(--lime); }
  .step-line { flex: 0 0 80px; height: 2px; background: rgba(255,255,255,.08); margin: 13px 10px 0; border-radius: 2px; overflow: hidden; }
  .step-line.on { background: var(--grad-ai); box-shadow: 0 0 8px rgba(182,255,60,.4); }

  /* Input view */
  #inputView { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 14px; }

  /* Camera area */
  .cam-wrap {
    flex: 1; min-height: 220px;
    background: #06100C;
    border-radius: 16px;
    position: relative; overflow: hidden;
    border: 1px solid var(--line-dark);
    display: flex; align-items: center; justify-content: center;
  }
  .cam-wrap::after {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background:
      linear-gradient(rgba(182,255,60,.04) 1px, transparent 1px) 0 0/100% 24px,
      linear-gradient(90deg, rgba(182,255,60,.04) 1px, transparent 1px) 0 0/24px 100%;
  }
  .cam-hint {
    position: absolute; top: 12px; left: 0; right: 0;
    text-align: center; color: rgba(232,245,238,.7); font-size: 11.5px; font-weight: 600;
    letter-spacing: .3px;
    z-index: 5; pointer-events: none;
  }
  #camVideo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
  .cam-fb {
    color: rgba(232,245,238,.65); font-size: 13px;
    text-align: center; line-height: 1.6; padding: 20px; z-index: 2;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .guide {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 4; pointer-events: none; overflow: hidden;
  }
  .c { position: absolute; width: 24px; height: 24px; border-style: solid; border-color: var(--lime); border-width: 0; filter: drop-shadow(0 0 4px rgba(182,255,60,.7)); }
  .c-tl { top:0; left:0;   border-top-width:3px; border-left-width:3px;  border-radius:4px 0 0 0; }
  .c-tr { top:0; right:0;  border-top-width:3px; border-right-width:3px; border-radius:0 4px 0 0; }
  .c-bl { bottom:0; left:0;  border-bottom-width:3px; border-left-width:3px;  border-radius:0 0 0 4px; }
  .c-br { bottom:0; right:0; border-bottom-width:3px; border-right-width:3px; border-radius:0 0 4px 0; }
  .scan {
    position: absolute; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--lime), var(--cyan), transparent);
    opacity: .9; animation: scan 2.2s linear infinite;
    box-shadow: 0 0 12px var(--lime);
  }
  @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
  .cam-btns {
    position: absolute; bottom: 14px; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center; gap: 36px; z-index: 6;
  }
  .cam-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(11,20,16,.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(182,255,60,.25); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--lime);
  }
  .cam-btn:active { background: rgba(182,255,60,.15); }
  .shutter {
    width: 64px; height: 64px; border-radius: 50%;
    border: 3px solid var(--lime); background: transparent; cursor: pointer; padding: 0;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--glow-lime);
  }
  .shutter-in { width: 50px; height: 50px; border-radius: 50%; background: var(--grad-ai); }
  .shutter:active .shutter-in { opacity: .8; }
  .img-badge {
    position: absolute; top: 10px; right: 10px; z-index: 7;
    background: var(--grad-ai); color: #0B1410; font-size: 11px; font-weight: 800;
    padding: 5px 10px; border-radius: 10px; display: none;
    box-shadow: var(--glow-lime); letter-spacing: .3px;
  }
  .img-badge.show { display: block; }

  /* Symptom section */
  .sec { flex-shrink: 0; }
  .sec-label {
    display: flex; align-items: center; gap: 7px;
    font-size: 12px; font-weight: 700; margin-bottom: 8px;
    color: var(--txt-on-dark); letter-spacing: .3px;
  }
  .num-badge {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--grad-ai); color: #0B1410;
    font-size: 11px; font-weight: 800; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--glow-lime);
  }
  .optional {
    font-size: 10px; color: var(--cyan); font-weight: 700;
    letter-spacing: .8px; text-transform: uppercase;
    border: 1px solid rgba(34,211,238,.35); padding: 2px 7px; border-radius: 6px;
  }

  #symptomInput {
    display: block; width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--line-dark); border-radius: 12px;
    padding: 12px 14px; font-size: 14px; font-family: inherit;
    resize: none; outline: none; color: var(--txt-on-dark);
    line-height: 1.5; overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
  }
  #symptomInput:focus { border-color: var(--lime); box-shadow: 0 0 0 3px rgba(182,255,60,.12); }
  #symptomInput::placeholder { color: rgba(122,139,130,.7); }
  .char-count { text-align: right; font-size: 11px; color: var(--muted-dark); margin-top: 5px; }

  /* Start button (sticky) */
  .diag-btn-wrap {
    flex-shrink: 0; position: sticky; bottom: 0; padding-top: 6px;
    background: linear-gradient(to top, var(--surface) 60%, transparent);
  }
  .diag-btn {
    width: 100%;
    background: var(--grad-ai);
    border: none; border-radius: 14px; padding: 15px;
    cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    transition: transform .12s, box-shadow .2s;
    box-shadow: 0 6px 24px rgba(182,255,60,.35), 0 0 0 1px rgba(182,255,60,.4);
    position: relative; overflow: hidden;
  }
  .diag-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,.35) 50%, transparent 70%);
    transform: translateX(-100%); transition: transform .8s;
  }
  .diag-btn:hover::before { transform: translateX(100%); }
  .diag-btn:active:not(:disabled) { transform: translateY(1px); box-shadow: 0 3px 14px rgba(182,255,60,.3); }
  .diag-btn:disabled { opacity: .55; cursor: not-allowed; box-shadow: none; }
  .diag-btn-main { color: #0B1410; font-size: 16px; font-weight: 800; font-family: inherit; display: flex; align-items: center; gap: 8px; letter-spacing: -0.2px; position: relative; z-index: 1; }
  .diag-btn-sub  { color: rgba(11,20,16,.7); font-size: 11px; font-family: inherit; font-weight: 600; letter-spacing: .2px; position: relative; z-index: 1; }
  .btn-spin {
    display: none; width: 16px; height: 16px;
    border: 2px solid rgba(11,20,16,.25); border-top-color: #0B1410;
    border-radius: 50%; animation: spin .75s linear infinite; flex-shrink: 0;
  }
  .btn-spin.show { display: inline-block; }

  /* Result view */
  #resultView { flex: 1; min-height: 0; overflow-y: auto; display: none; scrollbar-width: none; }
  #resultView::-webkit-scrollbar { display: none; }
  .result-card {
    border: 1px solid rgba(182,255,60,.3); border-radius: 16px; padding: 18px;
    background: var(--surface-2);
    animation: slideUp .35s ease;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .result-header { margin-bottom: 14px; }
  .result-badge {
    display: inline-block; font-size: 11px; padding: 3px 9px;
    border-radius: 8px; margin-bottom: 8px; font-weight: 800; letter-spacing: .5px;
    background: rgba(34,211,238,.12); color: var(--cyan); border: 1px solid rgba(34,211,238,.25);
  }
  .result-badge.urgent { background: var(--danger-soft); color: var(--danger); border: 1px solid rgba(255,85,119,.3); }
  .result-title {
    font-size: 22px; font-weight: 800; line-height: 1.3; letter-spacing: -0.4px;
    background: var(--grad-ai); -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .result-confidence { font-size: 13px; margin-top: 6px; font-weight: 700; }
  .result-confidence.high { color: var(--lime); }
  .result-confidence.mid  { color: var(--cyan); }
  .result-confidence.low  { color: var(--danger); }
  .result-section { margin-bottom: 14px; }
  .result-section-label {
    font-size: 11px; color: var(--cyan); margin-bottom: 5px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .result-section-body { font-size: 14px; color: var(--txt-on-dark); line-height: 1.6; }
  .result-list { list-style: none; padding: 0; }
  .result-list li { font-size: 14px; color: var(--txt-on-dark); line-height: 1.8; }
  .result-list li::before { content: "▸ "; color: var(--lime); font-weight: 700; }
  .result-list strong { color: var(--lime); font-weight: 900; }
  .result-list span { color: rgba(232,245,238,.78); font-size: 12.5px; line-height: 1.5; }
  .public-check {
    margin-top: 16px;
    border: 1px solid rgba(34,211,238,.25);
    border-radius: 14px;
    background: rgba(34,211,238,.08);
    padding: 14px;
  }
  .public-check-title {
    color: var(--cyan);
    font-size: 13px;
    font-weight: 900;
    letter-spacing: .2px;
  }
  .public-check-desc {
    margin-top: 7px;
    color: var(--txt-on-dark);
    font-size: 13px;
    line-height: 1.55;
  }
  .public-check-list {
    list-style: none;
    padding: 0;
    margin: 10px 0 0;
    display: grid;
    gap: 6px;
  }
  .public-check-list li {
    color: rgba(232,245,238,.9);
    font-size: 12.5px;
    line-height: 1.45;
    padding-left: 17px;
    position: relative;
  }
  .public-check-list li::before {
    content: "";
    position: absolute;
    left: 0;
    top: .45em;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--lime);
    box-shadow: 0 0 8px rgba(182,255,60,.45);
  }
  .public-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }
  .public-action {
    min-height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    text-decoration: none;
    padding: 8px 7px;
    font-size: 12px;
    line-height: 1.25;
    font-weight: 850;
    border: 1px solid rgba(182,255,60,.32);
    background: rgba(182,255,60,.11);
    color: var(--lime);
  }
  .public-action:nth-child(2) { border-color: rgba(34,211,238,.35); background: rgba(34,211,238,.10); color: var(--cyan); }
  .public-action:nth-child(3) { border-color: rgba(255,107,43,.38); background: rgba(255,107,43,.12); color: #FFB089; }
  .public-action:nth-child(4) { border-color: rgba(255,255,255,.18); background: rgba(255,255,255,.08); color: #fff; }
  .public-info-grid {
    display: grid;
    gap: 9px;
    margin-top: 12px;
  }
  .public-info-card {
    display: block;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.06);
    padding: 11px;
    text-decoration: none;
  }
  .public-info-card.priority {
    border-color: rgba(182,255,60,.32);
    background: rgba(182,255,60,.10);
  }
  .public-info-card-title {
    color: var(--txt-on-dark);
    font-size: 13px;
    font-weight: 900;
    line-height: 1.35;
  }
  .public-info-card-desc {
    margin-top: 5px;
    color: rgba(232,245,238,.76);
    font-size: 12px;
    line-height: 1.45;
    font-weight: 650;
  }
  .public-info-card-link {
    margin-top: 7px;

<script>
'use strict';

// TODO: Edge Function 교체 필요 — API 키를 프론트엔드에 직접 노출하지 마세요
const API_KEY = 'YOUR_API_KEY_HERE';

const SYSTEM_PROMPT = `당신은 농업·식물 문제를 정리하는 AI 참고 진단 도우미입니다.
절대 특정 농약을 추천하지 말 것.
절대 확정 처방으로 말하지 말 것.
절대 농약 사용이나 물품 선택을 유도하지 말 것.
사진과 증상 설명을 바탕으로 원인 후보, 확인 포인트, AI 추정 강도, 공공데이터 확인 항목만 정리하세요.
농약 사용 전 등록 작물, 병해충, 사용시기, 희석배수, 안전사용기준 확인을 안내하세요.
반드시 아래 JSON 형식으로만 응답하세요. 다른 텍스트 없이 JSON만 출력:
{
  "mode": "AI 참고 진단",
  "crop": "작물 또는 식물명",
  "symptoms": ["관찰 증상1", "관찰 증상2"],
  "causeCandidates": [
    { "name": "원인 후보명", "strength": "높음/중간/낮음", "reason": "판단 이유" }
  ],
  "checkPoints": ["확인 포인트1", "확인 포인트2", "확인 포인트3"],
  "publicDataNeeds": ["농약안전사용지침", "병해충 정보", "농업날씨"],
  "safetyNotice": "이 결과는 AI 참고 진단이며 최종 처방이 아닙니다. 농약 사용 전 등록 작물, 병해충, 사용시기, 희석배수, 안전사용기준을 반드시 확인하세요.",
  "urgent": false
}`;

let capturedFile = null;
let lastResult   = null;

let _tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => t.classList.remove('show'), 2500);
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const target = tab.dataset.tab;
    if (target === 'community') { location.href = 'index.html'; }
  });
});

/* ── Camera ── */
let stream = null;
let facing = 'environment';
let videoDevices = [];
let activeDeviceId = null;
const video  = document.getElementById('camVideo');
const camFb  = document.getElementById('camFb');
const secure = location.protocol === 'https:' || ['localhost', '127.0.0.1'].includes(location.hostname);

function setFallback(html) {
  video.style.display = 'none';
  camFb.innerHTML = html;
  camFb.style.display = 'flex';
}

async function startCamera(facingMode) {
  if (!secure) {
    setFallback(`<div style="font-size:28px;margin-bottom:8px">📷</div>
      <div>카메라는 HTTPS 또는 localhost에서 사용할 수 있습니다</div>
      <div style="font-size:11px;margin-top:4px;opacity:.7">앨범 업로드를 이용하세요</div>`);
    return;
  }
  if (!navigator.mediaDevices?.getUserMedia) {
    setFallback('<div>이 브라우저는 카메라를 지원하지 않습니다</div>');
    return;
  }
  try {
    const mode = facingMode || 'environment';
    if (mode === 'environment') {
      try {
        await openCameraStream({ video: { facingMode: { exact: 'environment' } }, audio: false });
      } catch (exactErr) {
        try {
          await openCameraStream({ video: { facingMode: { ideal: 'environment' } }, audio: false });
        } catch (idealErr) {
          const rearDeviceId = await findRearCameraDeviceId();
          if (rearDeviceId) {
            await openCameraStream({ video: { deviceId: { exact: rearDeviceId } }, audio: false });
          } else {
            await openCameraStream({ video: true, audio: false });
          }
        }
      }
    } else {
      try {
        await openCameraStream({ video: { facingMode: { exact: 'user' } }, audio: false });
      } catch (exactErr) {
        try {
          await openCameraStream({ video: { facingMode: { ideal: 'user' } }, audio: false });
        } catch (idealErr) {
          await openCameraStream({ video: true, audio: false });
        }
      }
    }
  } catch (err) {
    const denied = err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError';
    setFallback(denied
      ? `<div style="font-size:28px;margin-bottom:8px">🔒</div>
         <div>카메라 권한이 필요합니다</div>
         <div style="font-size:11px;margin-top:4px;opacity:.7">설정에서 허용 후 새로고침하세요</div>`
      : `<div style="font-size:28px;margin-bottom:8px">📷</div>
         <div>카메라를 시작할 수 없습니다</div>
         <button type="button" onclick="flipCamera()" style="margin-top:10px;border:1px solid rgba(182,255,60,.5);border-radius:999px;background:transparent;color:#B6FF3C;padding:8px 12px;font-weight:800">카메라 전환</button>
         <div style="font-size:11px;margin-top:4px;opacity:.7">앨범 버튼을 이용하세요</div>`);
  }
}

function stopCameraStream() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
}

async function openCameraStream(constraints) {
  stopCameraStream();
  stream = await navigator.mediaDevices.getUserMedia(constraints);
  video.srcObject = stream;
  video.style.display = 'block';
  camFb.style.display = 'none';
  const track = stream.getVideoTracks()[0];
  activeDeviceId = track?.getSettings?.().deviceId || null;
  await refreshVideoDevices();
}

async function refreshVideoDevices() {
  if (!navigator.mediaDevices?.enumerateDevices) return;
  const devices = await navigator.mediaDevices.enumerateDevices();
  videoDevices = devices.filter(device => device.kind === 'videoinput');
}

async function findRearCameraDeviceId() {
  await refreshVideoDevices();
  const rearPattern = /(back|rear|environment|back camera|\uD6C4\uBA74|\uB4A4)/i;
  const rearCamera = videoDevices.find(device => rearPattern.test(device.label || ''));
  return rearCamera?.deviceId || null;
}

async function flipCamera() {
  await refreshVideoDevices();
  if (videoDevices.length > 1) {
    const currentIndex = videoDevices.findIndex(device => device.deviceId === activeDeviceId);
    const nextDevice = videoDevices[(currentIndex + 1 + videoDevices.length) % videoDevices.length];
    if (nextDevice?.deviceId) {
      try {
        await openCameraStream({ video: { deviceId: { exact: nextDevice.deviceId } }, audio: false });
        return;
      } catch (err) {
        showToast('카메라 전환에 실패했습니다');
      }
    }
  }
  facing = facing === 'environment' ? 'user' : 'environment';
  startCamera(facing);
}
function capturePhoto() {
  document.getElementById('cameraInput').click();
}

function handleCameraCapture(input) {

  capturedFile = file;

}

function openAlbum() { document.getElementById('albumInput').click(); }

function toggleSymptom() {
  const body   = document.getElementById('symptomBody');
  const toggle = document.getElementById('symptomToggle');
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  toggle.textContent = isOpen ? '+' : '−';
}

function handleAlbumFile(input) {
  const file = input.files[0];
  if (!file) return;
  capturedFile = file;
  document.getElementById('imgBadge').classList.add('show');
  showToast('이미지가 선택되었습니다 ✓');
  input.value = '';
}

function sizeGuide() {
  const wrap  = document.getElementById('camWrap');
  const guide = document.getElementById('guide');
  if (!wrap || !guide) return;
  const w = wrap.offsetWidth;
  guide.style.width  = Math.round(w * 0.55) + 'px';
  guide.style.height = Math.round(w * 0.55 * 0.75) + 'px';
}

const symptomEl  = document.getElementById('symptomInput');
const charCountEl = document.getElementById('charCount');
symptomEl.addEventListener('input', () => {
  charCountEl.textContent = symptomEl.value.length;
  symptomEl.style.height = 'auto';
  symptomEl.style.height = symptomEl.scrollHeight + 'px';
});

/* ── Step indicator (2 steps) ── */
function setStep(n) {
  [1, 2].forEach(i => {
    const circle = document.getElementById('s' + i);
    const label  = circle?.nextElementSibling;
    circle?.classList.toggle('on', i <= n);
    label?.classList.toggle('on', i <= n);
  });
  document.getElementById('line1')?.classList.toggle('on', n >= 2);
}

function setLoading(on) {
  const btn     = document.getElementById('diagBtn');
  const btnSpin = document.getElementById('btnSpin');
  const btnText = document.getElementById('btnText');

function toBase64(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.readAsDataURL(file);
  });
}

function escHtml(s) {

}

}

function normalizeDiagnosisResult(result) {
  const firstCandidate = Array.isArray(result.causeCandidates) ? result.causeCandidates[0] : null;
  const legacyCandidate = result.cause ? [{ name: result.diagnosis || '원인 후보', strength: result.confidence || '중간', reason: result.cause }] : [];
  const causeCandidates = asArray(result.causeCandidates).length ? asArray(result.causeCandidates) : legacyCandidate;
  const checkPoints = asArray(result.checkPoints).length
    ? asArray(result.checkPoints)
    : asArray(result.solution).concat(asArray(result.prevention)).slice(0, 4);
  const publicDataNeeds = asArray(result.publicDataNeeds).length
    ? asArray(result.publicDataNeeds)
    : ['농약안전사용지침', '병해충 정보', '농업날씨'];
  const strength = result.confidence || firstCandidate?.strength || causeCandidates[0]?.strength || '중간';
  return {
    mode: result.mode || 'AI 참고 진단',
    crop: result.crop || '작물·식물',
    symptoms: asArray(result.symptoms),
    causeCandidates,
    checkPoints,
    publicDataNeeds,
    tags: asArray(result.tags),
    strength,
    title: result.diagnosis || causeCandidates[0]?.name || '원인 후보 정리',
    urgent: Boolean(result.urgent),
    safetyNotice: result.safetyNotice || '이 결과는 AI 참고 진단이며 최종 처방이 아닙니다. 농약 사용 전 등록 작물, 병해충, 사용시기, 희석배수, 안전사용기준을 반드시 확인하세요.'
  };
}

function normalizeTag(value) {
  return String(value || '').toLowerCase().replace(/\s+/g, '');
}

function collectDiagnosisTags(result) {
  const values = [
    result.crop,
    ...asArray(result.symptoms),
    ...asArray(result.publicDataNeeds),
    ...asArray(result.tags)
  ];
  asArray(result.causeCandidates).forEach(candidate => {
    if (typeof candidate === 'string') {
      values.push(candidate);
    } else {
      values.push(candidate?.name, candidate?.reason);
    }
  });
  return values.map(normalizeTag).filter(Boolean);
}

function collectQuestionTags(item) {
  const values = [
    item.crop,
    item.season,
    ...asArray(item.symptoms),
    ...asArray(item.causeCandidates),
    ...asArray(item.tags)
  ];
  return values.map(normalizeTag).filter(Boolean);
}

function calculateQuestionScore(result, item) {
  const crop = normalizeTag(result.crop);
  const symptomTags = asArray(result.symptoms).map(normalizeTag);
  const causeTags = asArray(result.causeCandidates).map(candidate => normalizeTag(typeof candidate === 'string' ? candidate : candidate?.name));
  const allDiagnosisTags = collectDiagnosisTags(result);
  const itemTags = collectQuestionTags(item);
  let score = 0;
  if (crop && itemTags.some(tag => tag.includes(crop) || crop.includes(tag))) score += 3;
  if (symptomTags.some(tag => itemTags.some(itemTag => itemTag.includes(tag) || tag.includes(itemTag)))) score += 3;
  if (causeTags.some(tag => itemTags.some(itemTag => itemTag.includes(tag) || tag.includes(itemTag)))) score += 2;
  if (allDiagnosisTags.some(tag => ['고온', '건조', '장마', '습도', '과습', '실내관리'].includes(tag) && itemTags.includes(tag))) score += 1;
  return score;
}

function safeLocalRead(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;

    showToast('이 브라우저에서는 반응 저장이 제한될 수 있습니다.');
    return fallback;
  }
}

function safeLocalWrite(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
    return true;
  } catch (err) {
    showToast('이 브라우저에서는 반응 저장이 제한될 수 있습니다.');
    return false;
  }
}

function handleCommunityReaction(type, id) {
  if (!FEATURE_SAME_SYMPTOM_REACTION && type === 'same') return;
  if (!FEATURE_HELPFUL_REACTION && type === 'helpful') return;
  const reactions = getReactionState();
  const key = `${type}:${id}`;
  if (reactions[key]) {
    showToast(type === 'same' ? '이미 같은 증상으로 표시했습니다.' : '이미 도움 됐어요로 표시했습니다.');
    return;
  }
  reactions[key] = new Date().toISOString();
  if (!safeLocalWrite(COMMUNITY_REACTION_KEY, reactions)) return;
  const el = document.getElementById(cardDomId(id, type));
  if (el) el.textContent = String((Number(el.textContent) || 0) + 1);
  showToast(type === 'same'
    ? '같은 증상으로 표시되었습니다. 비슷한 문제를 겪는 사용자에게 참고 신호가 됩니다.'

}

    return { ...card, score, index };

async function startDiagnosis() {
  const symptom = symptomEl.value.trim();

  if (!capturedFile && !symptom) {
    showToast('사진을 찍거나 증상을 입력해주세요');
    return;
  }

  setLoading(true);

  try {
    const userContent = [];

    if (capturedFile) {
      const base64    = await toBase64(capturedFile);
      const mediaType = capturedFile.type.startsWith('image/') ? capturedFile.type : 'image/jpeg';
      userContent.push({
        type: 'image',
        source: { type: 'base64', media_type: mediaType, data: base64 }
      });
    }

    userContent.push({
      type: 'text',
      text: `증상: ${symptom || '텍스트 없음, 사진만으로 판단해주세요'}`
    });

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 1024,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: userContent }]
      })
    });

    if (!res.ok) throw new Error('API_' + res.status);

    const data = await res.json();
    const raw  = data.content?.[0]?.text || '';

    let result;
    try {
      const clean = raw.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/, '').trim();
      result = JSON.parse(clean);
    } catch {
      throw new Error('PARSE_ERROR');
    }

    lastResult = result;
    showResult(result);

  } catch (err) {
    setLoading(false);
    showFallbackResult();
    if (err.message === 'PARSE_ERROR') {
      showToast('AI 참고 진단 결과를 불러오지 못했습니다. 다시 시도해주세요');
    } else if (err.message.startsWith('API_')) {
      showToast('서버 오류가 발생했습니다 (' + err.message.replace('API_', '') + ')');
    } else if (err.name === 'TypeError') {
      showToast('네트워크 연결을 확인해주세요');
    } else {
      showToast('AI 참고 진단에 실패했습니다. 다시 시도해주세요');
    }
  }
}

              <div class="public-info-card-link">확인하기</div>
            </a>
          `).join('')}
        </div>
        <div class="result-disclaimer">이 결과는 AI 참고 진단이며 최종 처방이 아닙니다. 농약 사용 전 등록 작물, 병해충, 사용시기, 희석배수, 안전사용기준을 반드시 확인하세요.</div>
      </div>
      ${renderCommunityConnect({ crop: '작물·식물', symptoms: [], causeCandidates: [], tags: [] })}
      <div class="result-actions">
        <button class="btn-retry" onclick="resetDiagnosis()">다시 확인하기</button>
        <button class="btn-share" onclick="location.href='public-data.html'">공공정보 확인</button>
      </div>
    </div>`;
  loadAndRenderRelatedQuestions({ crop: '작물·식물', symptoms: [], causeCandidates: [], tags: [] });
}

function showResult(result) {
  setLoading(false);
  setStep(2);

  document.getElementById('inputView').style.display = 'none';
  const rv = document.getElementById('resultView');
  rv.style.display = 'block';

  const safeResult = normalizeDiagnosisResult(result || {});
  const confMap = { '높음': 'high', '중간': 'mid', '보통': 'mid', '낮음': 'low' };
  const confClass = confMap[safeResult.strength] || 'mid';
  const urgentBadge = safeResult.urgent ? '<div class="result-badge urgent">주의 필요</div>' : '';
  const symptomMeta = safeResult.symptoms.length ? `<div class="result-section-body">${safeResult.symptoms.map(escHtml).join(' · ')}</div>` : '';

  rv.innerHTML = `
    <div class="result-card">
      <div class="result-header">
        ${urgentBadge}
        <div class="result-badge">${escHtml(safeResult.mode)}</div>
        <div class="result-title">${escHtml(safeResult.title)}</div>
        <div class="result-confidence ${confClass}">AI 추정 강도: ${escHtml(safeResult.strength)}</div>
      </div>
      <div class="result-section">
        <div class="result-section-label">작물/식물명</div>
        <div class="result-section-body">${escHtml(safeResult.crop)}</div>
      </div>
      <div class="result-section">
        <div class="result-section-label">관찰 증상</div>
        ${symptomMeta || '<div class="result-section-body">사진과 설명을 기준으로 추가 확인이 필요합니다.</div>'}
      </div>
      <div class="result-section">
        <div class="result-section-label">원인 후보</div>
        <ul class="result-list">${renderCauseCandidates(safeResult.causeCandidates)}</ul>
      </div>
      <div class="result-section">
        <div class="result-section-label">확인 포인트</div>
        <ul class="result-list">${renderPlainList(safeResult.checkPoints, '잎 앞면·뒷면, 줄기, 열매, 토양 상태를 함께 확인하세요.')}</ul>
      </div>
      ${renderPublicInfoCards(safeResult)}
      ${renderCommunityConnect(safeResult)}
      <div class="result-actions">
        <button class="btn-retry" onclick="resetDiagnosis()">다시 확인하기</button>
        <button class="btn-share" onclick="shareToCommunity()">커뮤니티에 질문하기</button>
      </div>
    </div>`;
  loadAndRenderRelatedQuestions(safeResult);
}

function renderMarkdown(text) {
  return window.marked ? marked.parse(String(text || '')) : escHtml(text || '');
}

function resetDiagnosis() {
  capturedFile = null;
  lastResult   = null;

  setStep(1);
  setLoading(false);

  document.getElementById('inputView').style.display = '';
  const rv = document.getElementById('resultView');
  rv.style.display = 'none';
  rv.innerHTML = '';

  symptomEl.value          = '';
  symptomEl.style.height   = 'auto';
  charCountEl.textContent  = '0';

  document.getElementById('symptomBody').style.display   = 'none';
  document.getElementById('symptomToggle').textContent   = '+';

  document.getElementById('imgBadge').classList.remove('show');
}

function shareToCommunity() {
  const pending = makePendingQuestion(lastResult || {});
  safeLocalWrite(PENDING_QUESTION_KEY, pending);
  location.href = 'channel.html?write=1&source=ai-reference-diagnosis';
}

/* ── Pull-to-refresh ── */
(function () {
  const area = document.getElementById('scrollArea');
  const ptr  = document.getElementById('ptr');
  const spin = document.getElementById('ptrSpin');
  const icon = document.getElementById('ptrIcon');
  const txt  = document.getElementById('ptrTxt');
  const THRESHOLD = 60;
  let sy = 0, dy = 0, pulling = false, loading = false;

  function set(s) {
    if (s === 'idle') {
      ptr.classList.remove('visible');
      icon.style.display = 'inline'; icon.classList.remove('flip');
      spin.classList.remove('show'); txt.textContent = '당겨서 새로고침';
    } else if (s === 'pulling') {
      ptr.classList.add('visible');
      icon.style.display = 'inline'; icon.classList.remove('flip');
      spin.classList.remove('show'); txt.textContent = '당겨서 새로고침';
    } else if (s === 'ready') {
      ptr.classList.add('visible');
      icon.style.display = 'inline'; icon.classList.add('flip');
      spin.classList.remove('show'); txt.textContent = '놓아서 새로고침';
    } else if (s === 'loading') {
      ptr.classList.add('visible');
      icon.style.display = 'none'; spin.classList.add('show');
      txt.textContent = '새로고침 중...';
    }
  }

  document.addEventListener('touchstart', e => {
    if (loading) return;
    sy = e.touches[0].clientY; pulling = true; dy = 0;
  }, { passive: true });
  document.addEventListener('touchmove', e => {
    if (!pulling || loading) return;
    dy = e.touches[0].clientY - sy;
    if (dy <= 0) { set('idle'); return; }
    set(dy >= THRESHOLD ? 'ready' : 'pulling');
  }, { passive: true });
  document.addEventListener('touchend', () => {
    if (!pulling || loading) return;
    pulling = false;
    if (dy >= THRESHOLD) {
      loading = true; set('loading');
      setTimeout(() => { loading = false; set('idle'); showToast('업데이트 완료'); }, 1500);
    } else { set('idle'); }
    dy = 0;
  }, { passive: true });
})();

window.addEventListener('DOMContentLoaded', () => {
  sizeGuide();
  startCamera(facing);
});
window.addEventListener('resize', sizeGuide);
</script>
