<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>지자체 보조사업 캘린더 - kFarmAI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0a0a;color:#17202a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}a{text-decoration:none;color:inherit}.app{max-width:480px;min-height:100dvh;margin:0 auto;background:#F5F6F8}.header{background:#fff;border-bottom:1px solid #ECEEF2;padding:12px 14px 14px}.top{display:flex;align-items:center;justify-content:space-between}.brand img{max-width:180px;height:auto}.home{border:1px solid #CDEBDD;background:#E8F6F0;color:#157A5A;border-radius:999px;padding:8px 11px;font-size:12px;font-weight:900}h1{margin-top:12px;font-size:23px}.sub{margin-top:7px;color:#6B7280;font-size:13px;line-height:1.55}.content{padding:14px 14px 90px}.filters{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}.select{height:42px;border:1.5px solid #DDE5E0;border-radius:12px;padding:0 10px;background:#fff;font-weight:800}.card{background:#fff;border:1px solid #ECEEF2;border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 8px 24px rgba(17,24,39,.05)}.badge{display:inline-flex;padding:5px 8px;border-radius:999px;font-size:11px;font-weight:900;background:#E8F6F0;color:#157A5A;margin-right:5px}.badge.orange{background:#FFF0E5;color:#B94712}.badge.dark{background:#111827;color:#fff}.title{margin-top:9px;font-size:16px;font-weight:900}.meta{margin-top:7px;color:#4B5563;font-size:12.5px;line-height:1.55}.note{background:#FFF8E1;border-color:#FDE68A;color:#5D4400;font-weight:800}.cta{display:grid;grid-template-columns:1fr 1fr;gap:8px}.cta a{min-height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:#E8F6F0;color:#157A5A;border:1px solid #CDEBDD;font-size:12px;font-weight:900}.cta a:nth-child(2){background:#111827;color:#fff;border-color:#111827}
</style>
</head>
<body><main class="app"><header class="header"><div class="top"><a class="brand" href="index.html"><img src="/static/kfarmai-logo-horizontal.png" alt="kFarmAI"></a><a class="home" href="index.html">홈</a></div><h1>지자체 보조사업 캘린더</h1><p class="sub">상토 보조사업 시즌을 놓치지 않도록 지역·품목·신청기간·상태를 모아보는 확장 기능입니다. 지역별 보조사업 공고를 확인할 수 있도록 수집·정리 중인 참고 기능입니다.</p></header><section class="content"><div class="filters"><select id="region" class="select"><option value="">전체 지역</option></select><select id="category" class="select"><option value="">전체 카테고리</option></select></div><div class="card note">상토 보조사업 시즌은 보통 연초 공고가 많아 사전 캘린더화 가치가 큽니다.</div><div id="list"></div><div class="card"><p class="sub">공공데이터 기반 의사결정 보조 정보이며, 실제 영농 판단은 지역 농업기술센터·전문가 상담과 함께 확인하세요.</p></div><div class="cta"><a href="crop-guide.html">재배가이드</a><a href="public-data.html">공공데이터</a></div></section></main><script>
'use strict';let rows=[];const cats=['상토','비료','농기계','시설원예','청년농','도시농업'];function statusClass(s){return s==='접수중'?'dark':s==='예정'?'orange':''}function draw(){const r=region.value,c=category.value;list.innerHTML=rows.filter(x=>(!r||x.region===r)&&(!c||x.category===c)).map(x=>`<article class="card"><span class="badge">${x.region}</span><span class="badge orange">${x.category}</span><span class="badge ${statusClass(x.status)}">${x.status}</span><div class="title">${x.title}</div><div class="meta">품목: ${x.crop}<br>신청기간: ${x.period}<br>${x.note}</div><a class="meta" href="${x.link}">공고문 확인 경로 보기</a></article>`).join('')||'<div class="card">조건에 맞는 샘플 공고가 없습니다.</div>'}fetch('data/subsidy_programs.json',{cache:'no-store'}).then(r=>r.json()).then(d=>{rows=d;[...new Set(d.map(x=>x.region))].forEach(v=>region.innerHTML+=`<option>${v}</option>`);cats.forEach(v=>category.innerHTML+=`<option>${v}</option>`);region.onchange=category.onchange=draw;draw();});
</script></body></html>
