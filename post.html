<script>
const SUPABASE_URL = 'https://xzetqijeucldbfgjuoes.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6ZXRxaWpldWNsZGJmZ2p1b2VzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NjIwODYsImV4cCI6MjA5NTEzODA4Nn0.QAizDLXQC1DrRi5C0sPahK6s_-6X4zkTEjzJZ6CFprw';
const CHANNEL_CONFIG = {
  'plant-hospital': '식물 병원',
  'plant-question': '식물 질문방',
  'crop-consult': '작물 상담방',
  'plant-brag': '내 식물 자랑',
  'farmer-lounge': '농부 사랑방',
  'plant-share': '식물 나눔·직거래',
  'garden-class': '원예 클래스',
  'plant-meet': '식집사 모임'
};
const CHANNEL_BADGE_COLORS = {'plant-question':'blue','crop-consult':'orange','plant-share':'teal'};
const params = new URLSearchParams(location.search);
const postId = params.get('id') || '';
let sb;
let currentUser = null;
let currentPost = null;
let localLiked = false;
function getLocalUserId(){let id=localStorage.getItem('kfarmai_user_id');if(!id){id='local_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,9);localStorage.setItem('kfarmai_user_id',id);}return id;}
function ownerId(){return localStorage.getItem('kfarmai_user_id') || getLocalUserId();}

document.addEventListener('DOMContentLoaded', init);

async function init() {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const { data: authData } = await sb.auth.getUser();
  currentUser = authData?.user || null;
  if (currentUser?.id) localStorage.setItem('kfarmai_user_id', currentUser.id);
  else getLocalUserId();
  if (!postId) {
    document.getElementById('postArea').innerHTML = '<div class="empty">게시글 ID가 없습니다.</div>';
    document.getElementById('commentList').innerHTML = '<div class="empty">댓글을 표시할 수 없습니다.</div>';
    document.getElementById('relatedList').innerHTML = '<div class="empty">관련 글을 표시할 수 없습니다.</div>';
    return;
  }
  await loadPost();
  await Promise.all([loadComments(), loadRelatedPosts()]);
}

async function loadPost() {
  try {
    const { data, error } = await sb
      .from('posts')
      .select('*, channels(name, slug)')
      .eq('id', postId)
      .single();
    if (error) throw error;
    currentPost = data;
    renderPost(data);
    incrementViewCount(data);
  } catch (err) {
    document.getElementById('postArea').innerHTML = '<div class="empty">게시글을 찾을 수 없습니다.<br>삭제되었거나 접근 권한이 없을 수 있습니다.</div>';
    document.getElementById('commentList').innerHTML = '<div class="empty">댓글을 표시할 수 없습니다.</div>';
    document.getElementById('relatedList').innerHTML = '<div class="empty">관련 글을 표시할 수 없습니다.</div>';
  }
}

function renderPost(post) {
  const slug = post.channels?.slug || '';
  const channelNameValue = post.channels?.name || channelName(slug);
  const isOwner = ownerId() === post.user_id;
  document.getElementById('channelTitle').textContent = channelNameValue;
  document.title = `${post.title || '게시글'} - kFarmAI`;
  const images = normalizeImages(post.image_urls);
  const imageHtml = images.length ? `<div class="image-slider">${images.map(url => `<img class="post-image" src="${escAttr(url)}" alt="게시글 이미지" loading="lazy" onclick="openImageModal('${escAttr(url)}')">`).join('')}</div>` : '';
  const ownerActions = isOwner ? `<div class="post-owner-actions"><button type="button" onclick="openEditPostModal()">수정</button><button class="delete" type="button" onclick="deletePost()">삭제</button></div>` : '';
  document.getElementById('postArea').innerHTML = `<article class="card"><span class="badge ${CHANNEL_BADGE_COLORS[slug] || ''}">${esc(channelNameValue)}</span>${post.category ? `<span class="badge" style="margin-left:6px;background:#E8F5E9;color:var(--green-dark)">${esc(post.category)}</span>` : ''}<h1 class="post-title">${esc(post.title || '제목 없음')}</h1><div class="meta"><span>${post.user_id ? '회원' : '익명'} 작성자</span><span>${post.region_tag ? '#' + esc(post.region_tag) : '지역 미지정'}</span><span>${timeAgo(post.created_at)}</span></div><div class="post-body">${esc(post.content || '')}</div>${imageHtml}${ownerActions}<div class="ai-card"><div class="ai-card-title">AI 분석</div><div class="ai-card-text">사진과 증상을 올리면 AI가 분석해드려요</div><button class="ai-card-btn" type="button" onclick="location.href='diagnosis.html'">AI 진단 시작하기</button></div><div class="actions"><span class="stat">조회 ${Number(post.view_count || 0).toLocaleString('ko-KR')}</span><button class="like-btn" id="likeBtn" type="button" onclick="toggleLike()">좋아요 ${Number(post.like_count || 0).toLocaleString('ko-KR')}</button></div></article>`;
}

function openImageModal(url){const modal=document.getElementById('imageModal');document.getElementById('imageModalImg').src=url;modal.classList.add('show');}
function closeImageModal(){document.getElementById('imageModal').classList.remove('show');document.getElementById('imageModalImg').src='';}
function openEditPostModal(){if(!currentPost)return;document.getElementById('editPostCategory').value=currentPost.category||'';document.getElementById('editPostTitle').value=currentPost.title||'';document.getElementById('editPostContent').value=currentPost.content||'';document.getElementById('editPostModal').classList.add('open');}
function closeEditPostModal(){document.getElementById('editPostModal').classList.remove('open');}
async function savePostEdit(){if(!currentPost||ownerId()!==currentPost.user_id)return showToast('권한이 없습니다.');const title=document.getElementById('editPostTitle').value.trim();const content=document.getElementById('editPostContent').value.trim();const category=document.getElementById('editPostCategory').value;if(!title||!content)return showToast('제목과 내용을 입력해주세요.');const btn=document.getElementById('editPostSubmit');btn.disabled=true;try{const {error}=await sb.from('posts').update({title,content,category:category||null}).eq('id',postId).eq('user_id',ownerId());if(error)throw error;closeEditPostModal();showToast('게시글이 수정되었습니다.');await loadPost();}catch(err){showToast(err.message||'수정에 실패했습니다.');}finally{btn.disabled=false;}}
async function deletePost(){if(!currentPost||ownerId()!==currentPost.user_id)return showToast('권한이 없습니다.');if(!confirm('정말 삭제하시겠습니까?'))return;try{const {error}=await sb.from('posts').delete().eq('id',postId).eq('user_id',ownerId());if(error)throw error;location.href='channel.html';}catch(err){showToast(err.message||'삭제에 실패했습니다.');}}


async function incrementViewCount(post) {
  const nextCount = Number(post.view_count || 0) + 1;
  try {
    await sb.from('posts').update({ view_count: nextCount }).eq('id', post.id);
  } catch (_) {
    // RLS 정책상 업데이트가 막혀도 상세 조회는 계속 동작해야 한다.
  }
}

async function loadComments() {
  try {
    const { data, error } = await sb
      .from('comments')
      .select('*')
      .eq('post_id', postId)
      .order('created_at', { ascending:true });
    if (error) throw error;
    renderComments(data || []);
  } catch (err) {
    document.getElementById('commentList').innerHTML = '<div class="empty">댓글을 불러오지 못했습니다.</div>';
  }
}

function renderComments(comments) {
  document.getElementById('commentCount').textContent = comments.length;
  const list = document.getElementById('commentList');
  if (!comments.length) { list.innerHTML = '<div class="empty">아직 댓글이 없습니다.<br>첫 댓글을 남겨보세요.</div>'; return; }
  list.innerHTML = comments.map(comment => {
    const isOwner = ownerId() === comment.user_id;
    return `<article class="comment" id="comment-${escAttr(comment.id)}"><div class="comment-head"><span>${comment.user_id ? '회원' : '익명'}</span>${comment.is_ai ? '<span class="ai-badge">AI</span>' : ''}<span>${timeAgo(comment.created_at)}</span>${isOwner ? `<div class="comment-actions"><button class="comment-action" type="button" onclick="editComment('${escAttr(comment.id)}', '${escAttr(comment.content || '')}')">수정</button><button class="comment-action delete" type="button" onclick="deleteComment('${escAttr(comment.id)}')">삭제</button></div>` : ''}</div><div class="comment-body">${esc(comment.content || '')}</div></article>`;
  }).join('');
}


async function submitComment() {
  const content = document.getElementById('commentInput').value.trim();
  if (!content) return showToast('댓글 내용을 입력해주세요.');
  const userId = currentUser?.id || ownerId();
  const btn = document.getElementById('commentSubmit');
  btn.disabled = true;
  try {
    const { error } = await sb.from('comments').insert({ post_id:postId, user_id:userId, content });
    if (error) throw error;
    document.getElementById('commentInput').value = '';
    showToast('댓글이 등록되었습니다.');
    loadComments();
  } catch (err) {
    showToast(err.message || '댓글 등록에 실패했습니다.');
  } finally {
    btn.disabled = false;
  }
}

async function loadRelatedPosts() {
  if (!currentPost?.channel_id) {
    document.getElementById('relatedList').innerHTML = '<div class="empty">관련 글이 없습니다.</div>';
    return;
  }
  try {
    const { data, error } = await sb
      .from('posts')
      .select('id,title,created_at,region_tag,channels(name, slug)')
      .eq('channel_id', currentPost.channel_id)
      .neq('id', postId)
      .order('created_at', { ascending:false })
      .limit(3);
    if (error) throw error;
    renderRelatedPosts(data || []);
  } catch (err) {
    document.getElementById('relatedList').innerHTML = '<div class="empty">관련 글을 불러오지 못했습니다.</div>';
  }
}

function renderRelatedPosts(posts) {
  const list = document.getElementById('relatedList');
  if (!posts.length) {
    list.innerHTML = '<div class="empty">같은 채널의 최근 글이 없습니다.</div>';
    return;
  }
  list.innerHTML = posts.map(post => {
    const slug = post.channels?.slug || '';
    return `<a class="related-card" href="post.html?id=${encodeURIComponent(post.id)}">
      <span class="badge ${CHANNEL_BADGE_COLORS[slug] || ''}">${esc(post.channels?.name || channelName(slug))}</span>
      <div class="related-title">${esc(post.title || '제목 없음')}</div>
      <div class="related-meta">${post.region_tag ? '#' + esc(post.region_tag) + ' · ' : ''}${timeAgo(post.created_at)}</div>
    </a>`;
  }).join('');
}

function toggleLike() {
  const btn = document.getElementById('likeBtn');
  if (!btn || !currentPost) return;
  localLiked = !localLiked;
  const base = Number(currentPost.like_count || 0);
  btn.classList.toggle('on', localLiked);
  btn.textContent = `좋아요 ${(base + (localLiked ? 1 : 0)).toLocaleString('ko-KR')}`;
}


function editComment(id, content){const el=document.getElementById('comment-'+id);if(!el)return;el.querySelector('.comment-body').innerHTML=`<textarea class="comment-edit-area" id="commentEdit-${id}">${esc(content)}</textarea><div class="comment-edit-actions"><button class="edit-submit" type="button" onclick="saveCommentEdit('${id}')">저장</button><button class="edit-cancel" type="button" onclick="loadComments()">취소</button></div>`;}
async function saveCommentEdit(id){const value=document.getElementById('commentEdit-'+id)?.value.trim();if(!value)return showToast('댓글 내용을 입력해주세요.');try{const {error}=await sb.from('comments').update({content:value}).eq('id',id).eq('user_id',ownerId());if(error)throw error;showToast('댓글이 수정되었습니다.');loadComments();}catch(err){showToast(err.message||'댓글 수정에 실패했습니다.');}}
async function deleteComment(id){if(!confirm('정말 삭제하시겠습니까?'))return;try{const {error}=await sb.from('comments').delete().eq('id',id).eq('user_id',ownerId());if(error)throw error;showToast('댓글이 삭제되었습니다.');loadComments();}catch(err){showToast(err.message||'댓글 삭제에 실패했습니다.');}}

function runSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (q) location.href = `index.html?q=${encodeURIComponent(q)}`;
}

function goBack() {
  if (history.length > 1) history.back();
  else location.href = 'channel.html';
}

function openLoginModal() { document.getElementById('loginModal').classList.add('open'); }
function closeLoginModal() { document.getElementById('loginModal').classList.remove('open'); }

async function loginGoogle() {
  const { error } = await sb.auth.signInWithOAuth({ provider:'google', options:{ redirectTo:location.href } });
  if (error) showToast('로그인 실패: ' + error.message);
}

function channelName(slug) { return CHANNEL_CONFIG[slug] || '일반'; }
function normalizeImages(value) {
  if (!value) return [];
  if (Array.isArray(value)) return value.filter(Boolean);
  if (typeof value === 'string') {
    try {
      const parsed = JSON.parse(value);
      return Array.isArray(parsed) ? parsed.filter(Boolean) : [value].filter(Boolean);
    } catch (_) {
      return value.split(',').map(v => v.trim()).filter(Boolean);
    }
  }
  return [];
}
function esc(value) {
  return String(value || '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function escAttr(value) { return esc(value).replace(/`/g, '&#96;'); }
function timeAgo(dateValue) {
  if (!dateValue) return '';
  const diff = Date.now() - new Date(dateValue).getTime();
  const min = Math.floor(diff / 60000);
  if (min < 1) return '방금';
  if (min < 60) return `${min}분 전`;
  const hour = Math.floor(min / 60);
  if (hour < 24) return `${hour}시간 전`;
  const day = Math.floor(hour / 24);
  if (day < 7) return `${day}일 전`;
  return new Date(dateValue).toLocaleDateString('ko-KR');
}
function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}
</script>
