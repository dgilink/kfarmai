<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"><title>재배가이드 - kFarmAI</title><style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0a0a;color:#17202a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}a{text-decoration:none;color:inherit}.app{max-width:480px;min-height:100dvh;margin:0 auto;background:#F5F6F8}.header{background:#fff;border-bottom:1px solid #ECEEF2;padding:12px 14px 14px}.top{display:flex;align-items:center;justify-content:space-between}.brand img{max-width:180px;height:auto}.home{border:1px solid #CDEBDD;background:#E8F6F0;color:#157A5A;border-radius:999px;padding:8px 11px;font-size:12px;font-weight:900}h1{margin-top:12px;font-size:23px}.sub{margin-top:7px;color:#6B7280;font-size:13px;line-height:1.55}.content{padding:14px 14px 90px}.card{background:#fff;border:1px solid #ECEEF2;border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 8px 24px rgba(17,24,39,.05)}.title{font-size:17px;font-weight:900}.meta{margin-top:7px;color:#4B5563;font-size:13px;line-height:1.55}.links{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}.links a{min-height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;text-align:center;padding:8px;background:#E8F6F0;color:#157A5A;border:1px solid #CDEBDD;font-size:12px;font-weight:900}.links a:nth-child(2){background:#FFF0E5;color:#B94712;border-color:#FFD7C2}.safe{background:#FFF8E1;border-color:#FDE68A;color:#5D4400;font-weight:800}
</style></head><body><main class="app"><header class="header"><div class="top"><a class="brand" href="index.html"><img src="static/kfarmai-logo-horizontal.png" alt="kFarmAI"></a><a class="home" href="index.html">홈</a></div><h1>재배가이드 허브</h1><p class="sub">기존 q/ 질문형 콘텐츠와 kb/ 지식 콘텐츠를 작물별 관리법, 병해충 주의, 진단사례, 재배달력, 공공데이터 링크로 연결합니다. 농촌진흥청_작목별농업기술정보 기반 고도화 예정입니다.</p></header><section class="content"><div id="list"></div><div class="card safe">공공데이터 기반 의사결정 보조 정보이며, 실제 영농 판단은 지역 농업기술센터·전문가 상담과 함께 확인하세요.</div></section></main><script>
'use strict';fetch('data/crop_guides.json',{cache:'no-store'}).then(r=>r.json()).then(rows=>{list.innerHTML=rows.map(x=>`<article class="card"><div class="title">${x.crop}</div><div class="meta">${x.basic}<br><b>병해충 주의:</b> ${x.pests}</div><div class="links"><a href="${x.cases}">진단사례</a><a href="${x.calendar}">재배달력</a><a href="${x.publicData}">공공데이터</a>${(x.links||[]).slice(0,2).map(u=>`<a href="${u}">관련 글</a>`).join('')}</div></article>`).join('')});
</script></body></html>
