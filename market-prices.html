<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>농산물 시세 - kFarmAI</title>
<link rel="icon" href="/static/kfarmai-logo-horizontal.png">
<meta name="description" content="농산물 시세를 판매나 중개가 아닌 시장 흐름 참고자료로 확인합니다.">
<style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0a0a;color:#17202a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}a{text-decoration:none;color:inherit}.app{max-width:480px;min-height:100dvh;margin:0 auto;background:#F5F6F8}.header{background:#fff;border-bottom:1px solid #ECEEF2;padding:12px 14px 14px}.top{display:flex;align-items:center;justify-content:space-between}.brand img{max-width:180px;height:auto}.home{border:1px solid #CDEBDD;background:#E8F6F0;color:#157A5A;border-radius:999px;padding:8px 11px;font-size:12px;font-weight:900}h1{margin-top:12px;font-size:23px}.sub{margin-top:7px;color:#6B7280;font-size:13px;line-height:1.55}.content{padding:14px 14px 90px}.search{width:100%;height:42px;border:1.5px solid #DDE5E0;border-radius:12px;padding:0 12px;background:#fff;font-weight:800;margin-bottom:10px}.card{background:#fff;border:1px solid #ECEEF2;border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 8px 24px rgba(17,24,39,.05)}.pill{display:inline-flex;padding:5px 8px;border-radius:999px;background:#E8F6F0;color:#157A5A;font-size:11px;font-weight:900;margin:0 5px 5px 0}.pill.orange{background:#FFF0E5;color:#B94712}.title{margin-top:8px;font-size:18px;font-weight:900}.price{font-size:22px;font-weight:950;color:#157A5A;margin-top:6px}.meta{font-size:12.5px;color:#4B5563;line-height:1.55;margin-top:5px}.safe{background:#FFF8E1;border-color:#FDE68A;color:#5D4400;font-size:12px;line-height:1.6;font-weight:800}.cta{display:grid;grid-template-columns:1fr 1fr;gap:8px}.cta a{min-height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;text-align:center;background:#E8F6F0;color:#157A5A;border:1px solid #CDEBDD;font-size:12px;font-weight:900}.cta a:nth-child(2n){background:#111827;color:#fff;border-color:#111827}.error{background:#fff;border:1px solid #FED7AA;color:#9A3412;border-radius:16px;padding:14px;margin-bottom:10px;font-size:13px;line-height:1.6;font-weight:800}
</style></head>
<body><main class="app">
  <header class="header"><div class="top"><a class="brand" href="index.html"><img src="/static/kfarmai-logo-horizontal.png" alt="kFarmAI"></a><a class="home" href="index.html">홈</a></div><h1>농산물 시세 참고</h1><p class="sub">농산물 시세는 판매·중개 목적이 아니라 시장 흐름을 참고하기 위한 공공 시세 정보입니다.</p></header>
  <section class="content">
    <input id="q" class="search" placeholder="고추, 토마토, 딸기, 오이, 상추">
    <div class="card"><span class="pill">공공 시세 정보</span><p class="meta">품목, 시장, 기준일, 단위, 가격을 참고자료로 표시합니다. 출하 판단을 단정하지 않으며 공식 공공 시세 제공처 확인이 필요합니다.</p></div>
    <div id="status"></div>
    <div id="list"></div>
    <div class="card safe">현재 시세 정보를 불러오지 못하면 최근 저장 데이터 또는 안내 카드가 표시됩니다. 공식 제공처 확인과 현장 상황을 함께 검토하세요.</div>
    <div class="cta"><a href="agri-weather.html">농업날씨 확인</a><a href="crop-guide.html">재배가이드 확인</a><a href="links.html">관련기관 확인</a><a href="public-data.html">공공정보 확인</a></div>
  </section>
</main><script>
'use strict';
let items=[];
const FALLBACK=[{item:'고추',market:'전국 참고',date:'2026-07-02',unit:'10kg',price:68000,change:'최근 저장 데이터',memo:'출하 전 공식 공공 시세 제공처를 확인하세요.'},{item:'토마토',market:'전국 참고',date:'2026-07-02',unit:'1kg',price:5200,change:'최근 저장 데이터',memo:'시장 흐름 참고자료입니다.'},{item:'딸기',market:'서울 가락 참고',date:'2026-07-02',unit:'2kg',price:23800,change:'최근 저장 데이터',memo:'시설재배 여부에 따라 출하 시기가 달라질 수 있습니다.'},{item:'오이',market:'전국 참고',date:'2026-07-02',unit:'100개',price:42000,change:'최근 저장 데이터',memo:'공식 시세와 현장 상황을 함께 확인하세요.'},{item:'상추',market:'전국 참고',date:'2026-07-02',unit:'4kg',price:18000,change:'최근 저장 데이터',memo:'시장 흐름 확인용 참고자료입니다.'}];
function esc(v){return String(v??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
function won(n){const num=Number(n);return Number.isFinite(num)&&num>0?num.toLocaleString('ko-KR')+'원':'가격 확인 필요'}
function value(item,keys,fallback='확인 필요'){for(const key of keys){if(item[key]!==undefined&&item[key]!==null&&item[key]!=='')return item[key]}return fallback}
function draw(){const kw=q.value.trim().toLowerCase();const filtered=items.filter(x=>!kw||String(value(x,['item','gds_sclsf_nm','gds_mclsf_nm'],'')).toLowerCase().includes(kw));list.innerHTML=filtered.map(x=>{const item=value(x,['item','gds_sclsf_nm','gds_mclsf_nm','gds_lclsf_nm']);return `<article class="card"><span class="pill">${esc(value(x,['type'],'시세'))}</span><span class="pill orange">${esc(value(x,['market','marketName','whsl_mrkt_nm']))}</span><div class="title">${esc(item)}</div><div class="price">${won(value(x,['price','scsbd_prc'],0))}</div><div class="meta">기준일: ${esc(value(x,['date','trd_clcln_ymd','scsbd_dt']))}<br>단위: ${esc(value(x,['unit','unit_nm','pkg_nm']))}<br>시장: ${esc(value(x,['market','marketName','whsl_mrkt_nm']))}<br>출하 참고 문구: ${esc(value(x,['memo','change'],'공식 제공처 확인이 필요합니다.'))}</div></article>`}).join('')||'<div class="card">검색 결과가 없습니다. 다른 품목명을 입력하거나 공식 공공 시세 제공처를 확인해주세요.</div>'}
async function loadPrices(){try{const res=await fetch('data/market_prices.json',{cache:'no-store'});if(res.ok){const data=await res.json();if(Array.isArray(data.items)&&data.items.length)return {items:data.items,fallback:false};}}catch(e){}return {items:FALLBACK,fallback:true}}
loadPrices().then(result=>{items=result.items;if(result.fallback)status.innerHTML='<div class="error">현재 시세 정보를 불러오지 못했습니다. 잠시 후 다시 확인하거나 공식 공공 시세 제공처를 확인해주세요.</div>';q.oninput=draw;draw();});
</script></body></html>
