<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>농업날씨 - kFarmAI</title>
<meta name="description" content="기상청_단기예보 조회서비스 기반 농작업 참고 정보를 확인합니다.">
<style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0a0a;color:#17202a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}a{text-decoration:none;color:inherit}.app{max-width:480px;min-height:100dvh;margin:0 auto;background:#F5F6F8}.header{position:sticky;top:0;background:#fff;border-bottom:1px solid #ECEEF2;padding:12px 14px 14px;z-index:5}.top{display:flex;align-items:center;justify-content:space-between}.brand img{max-width:180px;height:auto}.home{border:1px solid #CDEBDD;background:#E8F6F0;color:#157A5A;border-radius:999px;padding:8px 11px;font-size:12px;font-weight:900}h1{margin-top:12px;font-size:23px;line-height:1.28}.sub{margin-top:7px;color:#6B7280;font-size:13px;line-height:1.55}.content{padding:14px 14px 90px}.card{background:#fff;border:1px solid #ECEEF2;border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 8px 24px rgba(17,24,39,.05)}.label{font-size:12px;font-weight:900;color:#157A5A}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.metric{border-radius:12px;background:#F8FAFC;border:1px solid #E5E7EB;padding:10px}.metric b{display:block;font-size:16px}.metric span{display:block;margin-top:3px;font-size:11px;color:#6B7280;font-weight:800}.select{width:100%;height:42px;border:1.5px solid #DDE5E0;border-radius:12px;padding:0 12px;background:#fff;font-weight:800}.warn{background:#FFF7ED;border-color:#FED7AA;color:#9A3412}.cta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.cta a{min-height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;text-align:center;padding:9px;background:#E8F6F0;color:#157A5A;border:1px solid #CDEBDD;font-size:12px;font-weight:900}.cta a:nth-child(2){background:#111827;color:#fff;border-color:#111827}.safe{font-size:12px;line-height:1.6;color:#5D4400;background:#FFF8E1;border:1px solid #FDE68A;border-radius:14px;padding:12px;margin-top:12px;font-weight:800}.source{font-size:11px;color:#6B7280;margin-top:5px}
</style>
</head>
<body>
<main class="app">
  <header class="header">
    <div class="top"><a class="brand" href="index.html"><img src="static/kfarmai-logo-horizontal.png" alt="kFarmAI"></a><a class="home" href="index.html">홈</a></div>
    <h1>농업날씨</h1>
    <p class="sub">기상청_단기예보 조회서비스 기반 농작업 참고 정보입니다. ASOS 일자료는 과거 관측·병해충 조건 분석 고도화 데이터로만 설명합니다.</p>
  </header>
  <section class="content">
    <div class="card"><div class="label">지역 선택</div><select class="select" id="regionSelect"></select><div class="source" id="sourceText"></div></div>
    <div id="weatherCards"></div>
    <div class="card warn"><b>ASOS 일자료 활용 방향</b><p class="sub">기상청_지상(종관, ASOS) 일자료 조회서비스는 농업날씨 메인 API가 아니라 과거 기온·강수·습도 흐름을 병해충 조건 분석에 연결하는 고도화 데이터로 표현합니다.</p></div>
    <div class="safe">공공데이터 기반 의사결정 보조 정보이며, 실제 영농 판단은 지역 농업기술센터·전문가 상담과 함께 확인하세요.</div>
    <div class="cta"><a href="crop-calendar.html">재배달력</a><a href="public-data.html">공공데이터</a></div>
  </section>
</main>
<script>
'use strict';
const $=s=>document.querySelector(s);
function display(value,suffix=''){return value===undefined||value===null||value===''?'확인 필요':`${value}${suffix}`}
function metric(label,value){return `<div class="metric"><b>${value}</b><span>${label}</span></div>`}
function renderDay(title,d){return `<article class="card"><div class="label">${title}</div><div class="grid">${metric('기온',display(d.tempC,'℃'))}${metric('강수확률',display(d.rainProbability,'%'))}${metric('강수량',display(d.rainMm,'mm'))}${metric('습도',display(d.humidity,'%'))}${metric('풍속',display(d.windMs,'m/s'))}${metric('방제 주의',display(d.spray))}${metric('고온',display(d.heat))}${metric('저온',display(d.cold))}</div></article>`}
async function loadWeather(){for(const url of ['data/agri_weather.json','data/agri_weather_sample.json']){try{const res=await fetch(url,{cache:'no-store'});if(res.ok)return await res.json();}catch(e){}}throw new Error('weather data unavailable')}
loadWeather().then(data=>{const sel=$('#regionSelect');const regions=data.regions||[];$('#sourceText').textContent=data.source||'기상청_단기예보 조회서비스 기반 농작업 참고 정보';sel.innerHTML=regions.map(r=>`<option value="${r.id}">${r.name}</option>`).join('');function draw(){const r=regions.find(x=>x.id===sel.value)||regions[0];if(!r){$('#weatherCards').innerHTML='<div class="card">표시할 날씨 데이터가 없습니다.</div>';return;}$('#weatherCards').innerHTML=renderDay(r.name+' 오늘 농작업 주의',r.today||{})+renderDay(r.name+' 내일 농작업 주의',r.tomorrow||{})}sel.onchange=draw;draw();}).catch(()=>{$('#weatherCards').innerHTML='<div class="card">날씨 데이터를 불러오지 못했습니다. 샘플 JSON을 확인하세요.</div>';});
</script>
</body>
</html>
